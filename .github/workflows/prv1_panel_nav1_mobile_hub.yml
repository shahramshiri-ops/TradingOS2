name: PRV1 PANEL NAV1 Mobile Hub

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: prv1-panel-nav1-pages
  cancel-in-progress: true

jobs:
  build-mobile-hub:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create SIG Brain mobile hub
        shell: bash
        run: |
          mkdir -p panel/sigbrain-home
          mkdir -p proofs

          cat > panel/sigbrain-home/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>PRV1 + SIG Brain Hub</title>
            <style>
              body {
                margin: 0;
                font-family: Arial, Helvetica, sans-serif;
                background: #0f172a;
                color: #e5e7eb;
              }

              .wrap {
                max-width: 820px;
                margin: 0 auto;
                padding: 16px;
              }

              .hero,
              .card {
                border: 1px solid #334155;
                border-radius: 22px;
                background: #111827;
                padding: 18px;
                margin: 12px 0;
              }

              .card {
                background: #020617;
              }

              .badge {
                display: inline-block;
                padding: 6px 10px;
                border-radius: 999px;
                background: #1e293b;
                color: #93c5fd;
                font-size: 12px;
                margin-bottom: 12px;
              }

              h1 {
                font-size: 34px;
                line-height: 1.08;
                margin: 10px 0 10px;
              }

              h2 {
                font-size: 24px;
                margin: 0 0 8px;
              }

              p {
                color: #94a3b8;
                line-height: 1.45;
              }

              a.button {
                display: block;
                text-decoration: none;
                color: #e5e7eb;
                background: #1e293b;
                border: 1px solid #334155;
                border-radius: 16px;
                padding: 14px;
                margin-top: 10px;
                font-weight: 700;
              }

              a.button span {
                display: block;
                color: #94a3b8;
                font-weight: 400;
                font-size: 13px;
                margin-top: 4px;
              }

              .warn {
                color: #fca5a5;
              }

              .ok {
                color: #86efac;
              }

              .small {
                font-size: 12px;
                color: #94a3b8;
                overflow-wrap: anywhere;
              }
            </style>
          </head>

          <body>
            <div class="wrap">
              <section class="hero">
                <span class="badge">PRV1 + SIG BRAIN / MOBILE HUB</span>
                <h1>PRV1 + SIG Brain</h1>
                <p>
                  مرکز دسترسی موبایلی به پنل مغز، ژورنال مشاهده، payload و proofها.
                  این سیستم هنوز فقط display-only است و سیگنال معاملاتی نیست.
                </p>
              </section>

              <section class="card">
                <h2>Main runtime</h2>
                <a class="button" href="../sigbrain/?v=hub">
                  Open SIG Brain Panel
                  <span>نمایش وضعیت فعلی مغز، freshness، evidence و caveatها</span>
                </a>

                <a class="button" href="../sigbrain-journal/?v=hub">
                  Open Observation Journal
                  <span>نمایش snapshotهای ذخیره‌شده از وضعیت مغز</span>
                </a>
              </section>

              <section class="card">
                <h2>Data / Proof</h2>

                <a class="button" href="../../payloads/sig_brain_state_current.json?v=hub">
                  Open Current Payload JSON
                  <span>آخرین خروجی ماشینی SIG Brain</span>
                </a>

                <a class="button" href="../../proofs/prv1_live_feed1_proof.json?v=hub">
                  Open Live Feed Proof
                  <span>اثبات fetch read-only و timestamp feed</span>
                </a>

                <a class="button" href="../../proofs/prv1_journal_fix1_proof.json?v=hub">
                  Open Journal Fix Proof
                  <span>اثبات اینکه journal از payload فعلی ساخته شده</span>
                </a>

                <a class="button" href="../../proofs/prv1_pages_restore1_proof.json?v=hub">
                  Open Pages Restore Proof
                  <span>اثبات mirror/deploy مسیرهای GitHub Pages</span>
                </a>
              </section>

              <section class="card">
                <h2>Boundary</h2>
                <p class="warn">
                  Forbidden interpretation: this is not a trading signal, not validation,
                  not buy/sell/hold, not entry/stop/target, not broker execution,
                  and not forward shadow activation.
                </p>
                <p class="small">
                  Official refresh route: PRV1 AUTO REFRESH1 Master.
                </p>
              </section>
            </div>
          </body>
          </html>
          HTML

          cat > proofs/prv1_panel_nav1_proof.json <<'JSON'
          {
            "status": "PASS",
            "program": "PRV1_PANEL_NAV1_MOBILE_HUB",
            "scope": "navigation_hub_only",
            "hub_path": "panel/sigbrain-home/index.html",
            "signal_authorized": false,
            "broker_execution_authorized": false,
            "forward_shadow_authorized": false,
            "action_surface_authorized": false
          }
          JSON

      - name: Commit mobile hub
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add panel/sigbrain-home/index.html
          git add proofs/prv1_panel_nav1_proof.json

          git commit -m "Add PRV1 SIG Brain mobile navigation hub" || echo "No changes to commit"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
