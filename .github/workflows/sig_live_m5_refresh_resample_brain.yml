name: SIG Live M5 Refresh Resample Brain

on:
  workflow_dispatch:
  schedule:
    # Every 5 minutes Monday-Friday UTC, offset from :00 to reduce GitHub scheduler congestion.
    # GitHub schedules are not guaranteed to run exactly on time; this improves odds and keeps
    # the panel's last-successful-refresh status current even when a new M15 bar is not yet complete.
    - cron: "6,16,26,36,46,56 * * * 1-5"

concurrency:
  group: sig-live-m5-refresh-resample-brain
  cancel-in-progress: true

jobs:
  live-m5-refresh-resample-brain:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: write
    env:
      LFB_TWELVE_DATA_API_KEY: ${{ secrets.LFB_TWELVE_DATA_API_KEY }}
      TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
      SIG_ALERT_EMAIL_ENABLED: ${{ secrets.SIG_ALERT_EMAIL_ENABLED }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      SIG_ALERT_EMAIL_FROM: ${{ secrets.SIG_ALERT_EMAIL_FROM }}
      SIG_ALERT_EMAIL_TO: ${{ secrets.SIG_ALERT_EMAIL_TO }}
      SIG_ALERT_EMAIL_REPLY_TO: ${{ secrets.SIG_ALERT_EMAIL_REPLY_TO }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python - <<'PY'
          import pandas as pd
          import numpy as np
          print("pandas", pd.__version__)
          print("numpy", np.__version__)
          PY

      - name: Run read-only M5 refresh + internal resampling + brain payload + refresh status
        run: |
          python scripts/run_live_m5_refresh_pipeline.py --fetch-live
          python scripts/validate_sig_live_m5base1_outputs.py
          python scripts/build_sig_live_refresh_status.py
          python scripts/update_sig_brain4_event_history.py
          python scripts/validate_sig_brain4_event_history.py
          python scripts/send_sig_brain4_event_email_alerts.py

      - name: Commit generated read-only data, brain payload, and refresh status
        id: commit_generated
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/live_m5 data/live_resampled inputs/sig_brain5_raw_bars_latest.json inputs/sig_brain4_live_context_latest.json runtime/sig_brain panel/brain4 proofs
          if git diff --cached --quiet; then
            echo "No generated changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Update read-only live refresh status and brain state"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger static Pages deploy after generated commit
        if: steps.commit_generated.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run deploy_tradingos_pages.yml --ref "${GITHUB_REF_NAME}"
