name: SIG Live M5 Refresh Resample Brain

on:
  workflow_dispatch:
  schedule:
    # Every 5 minutes Monday-Friday UTC, offset from :00 to reduce GitHub scheduler congestion.
    # GitHub schedules are not guaranteed to run exactly on time; this improves odds and keeps
    # the panel's last-successful-refresh status current even when a new M15 bar is not yet complete.
    - cron: "6,16,26,36,46,56 * * * 1-5"

concurrency:
  group: sig-live-m5-refresh-resample-brain
  cancel-in-progress: true

jobs:
  live-m5-refresh-resample-brain:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: write
    env:
      LFB_TWELVE_DATA_API_KEY: ${{ secrets.LFB_TWELVE_DATA_API_KEY }}
      TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
      SIG_ALERT_EMAIL_ENABLED: ${{ secrets.SIG_ALERT_EMAIL_ENABLED }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      SIG_ALERT_EMAIL_FROM: ${{ secrets.SIG_ALERT_EMAIL_FROM }}
      SIG_ALERT_EMAIL_TO: ${{ secrets.SIG_ALERT_EMAIL_TO }}
      SIG_ALERT_EMAIL_REPLY_TO: ${{ secrets.SIG_ALERT_EMAIL_REPLY_TO }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python - <<'PY'
          import pandas as pd
          import numpy as np
          print("pandas", pd.__version__)
          print("numpy", np.__version__)
          PY

      # SIG-E-ARCH1  -  target E architecture contract validation (NOT_SIGNAL / NO_EXECUTION)
      - name: Validate SIG-E-ARCH1 decision architecture contracts
        run: |
          python scripts/build_sig_e_arch1_status.py
          python scripts/validate_sig_e_arch1_contracts.py

      - name: Run read-only M5 refresh + internal resampling + brain payload + refresh status
        run: |
          python scripts/run_live_m5_refresh_pipeline.py --fetch-live
          python scripts/validate_sig_live_m5base1_outputs.py
          python scripts/build_sig_live_refresh_status.py
          python scripts/update_sig_brain4_event_history.py
          python scripts/validate_sig_brain4_event_history.py
          python scripts/send_sig_brain4_event_email_alerts.py
          python scripts/run_sig_shadow_01b_integrated.py
          python scripts/run_sig_shadow_ready_01.py

      # SIG-E-REGIME1  -  market state / regime runtime layer (CONTEXT_ONLY / NOT_SIGNAL)
      - name: Build SIG-E-REGIME1 market state context
        run: |
          python scripts/build_sig_e_regime1_market_state.py
          python scripts/validate_sig_e_regime1_market_state.py

      # SHADOW-CANDIDATE-UNIVERSE-01  -  research-only candidate bank for forward observation (NOT_SIGNAL)
      # SIG-E-SHADOW-WORKFLOW-CHAIN1  -  detectors + ledgers + portfolio + persistence (NOT_SIGNAL)
      - name: Build SIG-E shadow detector portfolio and persistence chain
        run: |
          set -e
          python scripts/restore_sig_e_shadow_persistence1.py

          python scripts/build_sig_e_shadow_detector1_usdjpy_london_long.py
          python scripts/validate_sig_e_shadow_detector1.py
          python scripts/build_sig_e_shadow_detector1_obsledger.py
          python scripts/validate_sig_e_shadow_detector1_obsledger.py

          python scripts/build_sig_e_shadow_detector2_usdjpy_asia_short.py
          python scripts/validate_sig_e_shadow_detector2.py
          python scripts/build_sig_e_shadow_detector2_obsledger.py
          python scripts/validate_sig_e_shadow_detector2_obsledger.py

          python scripts/build_sig_e_shadow_detector3_eurusd_pdlow_trap_long.py
          python scripts/validate_sig_e_shadow_detector3.py
          python scripts/build_sig_e_shadow_detector3_obsledger.py
          python scripts/validate_sig_e_shadow_detector3_obsledger.py
          python scripts/build_sig_e_shadow_portfolio1.py
          python scripts/validate_sig_e_shadow_portfolio1.py

          python scripts/build_sig_e_shadow_observation_report1.py
          python scripts/validate_sig_e_shadow_observation_report1.py
          python scripts/build_sig_e_shadow_coverage1.py
          python scripts/validate_sig_e_shadow_coverage1.py
          python scripts/build_sig_e_shadow_lane1_overlap_preflight1.py
          python scripts/validate_sig_e_shadow_lane1_overlap_preflight1.py

          python scripts/build_sig_e_shadow_persistence1_snapshot.py
          python scripts/validate_sig_e_shadow_persistence1.py

      - name: Build SHADOW-CANDIDATE-UNIVERSE-01 research candidates
        run: python scripts/run_shadow_candidate_universe_01.py

      # SHADOW-DIAG-01  -  near-miss/blocker/eligibility diagnostics (NOT_SIGNAL)
      - name: Build SHADOW-DIAG-01 diagnostics
        run: python scripts/run_sig_shadow_diag_01.py

      # SHADOW-OPS-01  -  diagnostics, eligibility, rollups, health (NOT_SIGNAL)
      - name: Build SHADOW-OPS-01 operational diagnostics
        run: python scripts/run_sig_shadow_ops_01.py

      # REASON-UPSTREAM-01 / DIAG-02  -  enrich near-miss reason codes (NOT_SIGNAL)
      - name: Build REASON-UPSTREAM-01 near-miss reason source
        run: python scripts/run_sig_shadow_reason_upstream_01.py

      # COUNT-NORMALIZE-01  -  clarify shadow count semantics (NOT_SIGNAL)
      - name: Build COUNT-NORMALIZE-01 shadow count semantics
        run: python scripts/run_sig_shadow_count_normalize_01.py

      # LIVE-SHADOW-FOUNDATION-01  -  append-only context/setup/trigger logs (NOT_SIGNAL)
      - name: Build LIVE-SHADOW-FOUNDATION-01 append-only logs
        run: python scripts/run_sig_live_shadow_foundation_01.py

      # SHADOW-OUTCOME-01  -  path observation after shadow objects (NOT_SIGNAL, NOT_PNL)
      - name: Build SHADOW-OUTCOME-01 path observations
        run: python scripts/run_sig_shadow_outcome_01.py

      # SHADOW-OUTCOME-01A  -  price-bar anchor fallback for outcome observations (NOT_SIGNAL, NOT_PNL)
      - name: Build SHADOW-OUTCOME-01A price anchors
        run: python scripts/run_shadow_outcome_01a_price_anchor.py

      # SHADOW-OUTCOME-01B  -  H1 price source bridge for outcome observations (NOT_SIGNAL, NOT_PNL)
      - name: Build SHADOW-OUTCOME-01B H1 price bridge
        run: python scripts/run_shadow_outcome_01b_price_source_bridge.py

      # SHADOW-OUTCOME-01C  -  live-recent M5 price bridge guard (NOT_SIGNAL, NOT_PNL)
      - name: Build SHADOW-OUTCOME-01C live-recent price bridge
        run: python scripts/run_shadow_outcome_01c_live_recent_price_bridge.py

      # SHADOW-OUTCOME-01D  -  freshness, closed-H1 and completion guard (NOT_SIGNAL, NOT_PNL)
      - name: Build SHADOW-OUTCOME-01D outcome quality guard
        run: python scripts/run_shadow_outcome_01d.py

      # LIVE-OBSERVATION-MAX-VALUE-01  -  forward evidence ledger/summaries (DISPLAY_ONLY, NOT_SIGNAL)
      - name: Build LIVE-OBSERVATION-MAX-VALUE-01 forward evidence pack
        run: |
          python scripts/build_live_observation_max_value_01.py
          python scripts/validate_live_observation_max_value_01.py

      # SHADOW-CANDIDATE-OUTCOME-BASELINE-01  -  outcome + control baseline for research shadow candidates (NOT_SIGNAL)
      - name: Build SHADOW-CANDIDATE-OUTCOME-BASELINE-01 research outcomes
        run: |
          python scripts/build_shadow_candidate_outcome_baseline_01.py
          python scripts/validate_shadow_candidate_outcome_baseline_01.py

      - name: Commit generated read-only data, brain payload, and refresh status
        run: python scripts/actions_commit_generated_readonly_safe.py
      # ACTIONS-DEPLOY-LINK-03  -  explicit static Pages deploy trigger after live refresh
      - name: Commit SIG-E shadow persistence generated outputs
        if: success()
        run: python scripts/commit_sig_e_shadow_persistence_outputs.py

      - name: Trigger static Pages deploy after live refresh
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          echo "Triggering Deploy TradingOS Static Pages after live refresh..."
          gh workflow run "Deploy TradingOS Static Pages" --ref "${GITHUB_REF_NAME:-main}" || \
          gh workflow run "deploy_tradingos_static_pages.yml" --ref "${GITHUB_REF_NAME:-main}" || \
          gh workflow run "deploy.yml" --ref "${GITHUB_REF_NAME:-main}"

# SIG-E-RUNTIME-SPEC1 validation steps were not auto-inserted. Add manually if needed.


# SIG-E-RUNTIME-SHADOW-DETECTOR1 steps were not auto-inserted. Add manually if needed.

#        run: python scripts/validate_sig_e_shadow_persistence1.py


