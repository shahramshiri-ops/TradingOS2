name: SIG Live M5 Refresh Resample Brain

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * 1-5"

jobs:
  live-m5-refresh-resample-brain:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      LFB_TWELVE_DATA_API_KEY: ${{ secrets.LFB_TWELVE_DATA_API_KEY }}
      TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - name: Run read-only M5 refresh + internal resampling + brain payload
        run: |
          python scripts/run_live_m5_refresh_pipeline.py --fetch-live
          python scripts/validate_sig_live_m5base1_outputs.py
      - name: Commit generated read-only data and brain payload
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/live_m5 data/live_resampled inputs/sig_brain5_raw_bars_latest.json inputs/sig_brain4_live_context_latest.json runtime/sig_brain panel/brain4 proofs
          git commit -m "Update read-only M5 canonical resampled brain state" || echo "No changes"
          git push || true
