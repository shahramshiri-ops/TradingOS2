name: PRV1 JOURNAL FIX1 From Current Payload

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: prv1-journal-fix1-pages
  cancel-in-progress: true

jobs:
  fix-journal-from-current-payload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rebuild journal from current FRESH payload
        shell: bash
        run: |
          mkdir -p journal proofs personal_runtime_v1_latest_product/journal personal_runtime_v1_latest_product/proofs

          python - <<'PY'
          import json
          from pathlib import Path
          from datetime import datetime, timezone

          ROOT_PAYLOAD = Path("payloads/sig_brain_state_current.json")
          PERSONAL_PAYLOAD = Path("personal_runtime_v1_latest_product/payloads/sig_brain_state_current.json")

          ROOT_JOURNAL = Path("journal/sig_brain_state_journal.jsonl")
          ROOT_SUMMARY = Path("journal/sig_brain_state_journal_summary.json")
          ROOT_PROOF = Path("proofs/prv1_journal_fix1_proof.json")

          PERSONAL_JOURNAL = Path("personal_runtime_v1_latest_product/journal/sig_brain_state_journal.jsonl")
          PERSONAL_SUMMARY = Path("personal_runtime_v1_latest_product/journal/sig_brain_state_journal_summary.json")
          PERSONAL_PROOF = Path("personal_runtime_v1_latest_product/proofs/prv1_journal_fix1_proof.json")

          def now_utc():
              return datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          def read_json(path, default=None):
              if default is None:
                  default = {}
              try:
                  if Path(path).exists():
                      return json.loads(Path(path).read_text(encoding="utf-8"))
              except Exception:
                  return default
              return default

          def read_lines(path):
              if not Path(path).exists():
                  return []
              return [
                  line for line in Path(path).read_text(encoding="utf-8").splitlines()
                  if line.strip()
              ]

          if ROOT_PAYLOAD.exists():
              payload_path = ROOT_PAYLOAD
          elif PERSONAL_PAYLOAD.exists():
              payload_path = PERSONAL_PAYLOAD
          else:
              raise SystemExit("No sig_brain_state_current.json payload found")

          payload = read_json(payload_path)
          cards = payload.get("cards", [])

          snapshot = {
              "journal_program": "PRV1_JOURNAL_FIX1_FROM_CURRENT_PAYLOAD",
              "snapshot_created_at_utc": now_utc(),
              "payload_path_used": str(payload_path),
              "source_payload_created_at_utc": payload.get("created_at_utc"),
              "source_program": payload.get("program"),
              "authority": "DISPLAY_ONLY_NOT_SIGNAL",
              "signal_authorized": False,
              "broker_execution_authorized": False,
              "forward_shadow_authorized": False,
              "action_surface_authorized": False,
              "card_count": len(cards),
              "state_counts": {},
              "surface_states": []
          }

          for c in cards:
              state = c.get("brain_state", "UNKNOWN")
              snapshot["state_counts"][state] = snapshot["state_counts"].get(state, 0) + 1

              snapshot["surface_states"].append({
                  "instrument": c.get("instrument"),
                  "timeframe": c.get("timeframe"),
                  "surface": c.get("surface"),
                  "brain_state": state,
                  "candidate_family": c.get("candidate_family"),
                  "surface_evidence_available": c.get("surface_evidence_available"),
                  "freshness_status": c.get("freshness_status"),
                  "freshness_age_minutes": c.get("freshness_age_minutes"),
                  "latest_provider_datetime_utc": c.get("latest_provider_datetime_utc"),
                  "blocker_count": len(c.get("blockers", [])),
                  "caveat_count": len(c.get("caveats", [])),
                  "display_authority": c.get("display_authority")
              })

          lines = read_lines(ROOT_JOURNAL)
          lines.append(json.dumps(snapshot, ensure_ascii=False, sort_keys=True))

          if len(lines) > 500:
              lines = lines[-500:]

          parsed = [json.loads(x) for x in lines]
          aggregate_state_counts = {}
          latest_surface_states = {}

          for row in parsed:
              for state, count in row.get("state_counts", {}).items():
                  aggregate_state_counts[state] = aggregate_state_counts.get(state, 0) + int(count)

              for s in row.get("surface_states", []):
                  key = f"{s.get('instrument')}_{s.get('timeframe')}"
                  latest_surface_states[key] = s

          summary = {
              "program": "PRV1_JOURNAL_FIX1_FROM_CURRENT_PAYLOAD",
              "updated_at_utc": now_utc(),
              "payload_path_used": str(payload_path),
              "retained_snapshot_count": len(parsed),
              "latest_snapshot_at_utc": snapshot["snapshot_created_at_utc"],
              "aggregate_state_counts": aggregate_state_counts,
              "latest_surface_states": latest_surface_states,
              "authority": "DISPLAY_ONLY_NOT_SIGNAL",
              "signal_authorized": False,
              "broker_execution_authorized": False,
              "forward_shadow_authorized": False,
              "action_surface_authorized": False
          }

          proof = {
              "status": "PASS",
              "program": "PRV1_JOURNAL_FIX1_FROM_CURRENT_PAYLOAD",
              "payload_path_used": str(payload_path),
              "cards_checked": len(cards),
              "retained_snapshot_count": len(parsed),
              "eurusd_h1_freshness": latest_surface_states.get("EURUSD_H1", {}).get("freshness_status"),
              "signal_authorized": False,
              "broker_execution_authorized": False,
              "forward_shadow_authorized": False,
              "action_surface_authorized": False
          }

          ROOT_JOURNAL.write_text("\n".join(lines) + "\n", encoding="utf-8")
          ROOT_SUMMARY.write_text(json.dumps(summary, indent=2, ensure_ascii=False), encoding="utf-8")
          ROOT_PROOF.write_text(json.dumps(proof, indent=2, ensure_ascii=False), encoding="utf-8")

          PERSONAL_JOURNAL.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PERSONAL_SUMMARY.write_text(json.dumps(summary, indent=2, ensure_ascii=False), encoding="utf-8")
          PERSONAL_PROOF.write_text(json.dumps(proof, indent=2, ensure_ascii=False), encoding="utf-8")
          PY

      - name: Commit fixed journal files
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add journal/sig_brain_state_journal.jsonl
          git add journal/sig_brain_state_journal_summary.json
          git add proofs/prv1_journal_fix1_proof.json

          git add personal_runtime_v1_latest_product/journal/sig_brain_state_journal.jsonl
          git add personal_runtime_v1_latest_product/journal/sig_brain_state_journal_summary.json
          git add personal_runtime_v1_latest_product/proofs/prv1_journal_fix1_proof.json

          git commit -m "Fix SIG Brain journal from current fresh payload" || echo "No changes to commit"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
