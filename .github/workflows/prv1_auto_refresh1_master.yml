name: PRV1 AUTO REFRESH1 Master

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

permissions:
  actions: write
  contents: read

concurrency:
  group: prv1-auto-refresh1-master
  cancel-in-progress: false

jobs:
  run-refresh-chain:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run PRV1 refresh chain
        shell: bash
        run: |
          set -e

          run_and_wait () {
            local WF="$1"
            echo "Dispatching workflow: $WF"

            local START_TIME
            START_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            gh workflow run "$WF" --repo "$GITHUB_REPOSITORY" --ref main

            echo "Waiting for workflow run to appear..."
            sleep 12

            local RUN_ID=""

            for i in {1..30}; do
              RUN_ID=$(gh run list \
                --repo "$GITHUB_REPOSITORY" \
                --workflow "$WF" \
                --branch main \
                --event workflow_dispatch \
                --limit 10 \
                --json databaseId,createdAt,status,conclusion \
                --jq ".[] | select(.createdAt >= \"$START_TIME\") | .databaseId" \
                | head -n 1)

              if [ -n "$RUN_ID" ]; then
                break
              fi

              sleep 5
            done

            if [ -z "$RUN_ID" ]; then
              echo "Could not find dispatched run for $WF"
              exit 1
            fi

            echo "Watching run id: $RUN_ID"
            gh run watch "$RUN_ID" --repo "$GITHUB_REPOSITORY" --exit-status
          }

          run_and_wait "prv1_live_feed1_twelvedata_timestamp.yml"
          run_and_wait "prv1_journal_fix1_from_current_payload.yml"
          run_and_wait "prv1_pages_restore1.yml"

          echo "PRV1 AUTO REFRESH1 completed successfully."
