name: PRV1 LIVE FEED1 Twelve Data Timestamp Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "11 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: prv1-live-feed1-pages
  cancel-in-progress: true

jobs:
  fetch-twelvedata-timestamps:
    runs-on: ubuntu-latest

    env:
      TD_API_KEY_PRIMARY: ${{ secrets.LFB_TWELVE_DATA_API_KEY }}
      TD_API_KEY_ALT: ${{ secrets.TWELVE_DATA_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest Twelve Data timestamps and update SIG Brain payload
        shell: bash
        run: |
          mkdir -p personal_runtime_v1_latest_product/payloads
          mkdir -p personal_runtime_v1_latest_product/reports
          mkdir -p personal_runtime_v1_latest_product/proofs

          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request
          from pathlib import Path
          from datetime import datetime, timezone

          ROOT = Path("personal_runtime_v1_latest_product")
          PAYLOAD = ROOT / "payloads/sig_brain_state_current.json"
          REPORT = ROOT / "reports/prv1_live_feed1_twelvedata_timestamp_report.json"
          PROOF = ROOT / "proofs/prv1_live_feed1_proof.json"

          API_KEY = os.environ.get("TD_API_KEY_PRIMARY") or os.environ.get("TD_API_KEY_ALT") or ""

          SURFACES = [
              {
                  "instrument": "EURUSD",
                  "timeframe": "H1",
                  "surface": "EURUSD_H1",
                  "symbol": "EUR/USD",
                  "interval": "1h"
              },
              {
                  "instrument": "USDJPY",
                  "timeframe": "H1",
                  "surface": "USDJPY_H1",
                  "symbol": "USD/JPY",
                  "interval": "1h"
              },
              {
                  "instrument": "XAUUSD",
                  "timeframe": "M15",
                  "surface": "XAUUSD_M15",
                  "symbol": "XAU/USD",
                  "interval": "15min"
              },
              {
                  "instrument": "EURUSD",
                  "timeframe": "M15",
                  "surface": "EURUSD_M15",
                  "symbol": "EUR/USD",
                  "interval": "15min"
              },
              {
                  "instrument": "USDJPY",
                  "timeframe": "M15",
                  "surface": "USDJPY_M15",
                  "symbol": "USD/JPY",
                  "interval": "15min"
              },
              {
                  "instrument": "XAUUSD",
                  "timeframe": "H1",
                  "surface": "XAUUSD_H1",
                  "symbol": "XAU/USD",
                  "interval": "1h"
              }
          ]

          def now_utc():
              return datetime.now(timezone.utc).replace(microsecond=0)

          def iso(dt):
              return dt.astimezone(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          def read_json(path, default=None):
              if default is None:
                  default = {}
              try:
                  p = Path(path)
                  if p.exists():
                      return json.loads(p.read_text(encoding="utf-8"))
              except Exception:
                  return default
              return default

          def write_json(path, data):
              Path(path).write_text(
                  json.dumps(data, indent=2, ensure_ascii=False),
                  encoding="utf-8"
              )

          def parse_dt(value):
              if value is None:
                  return None

              text = str(value).strip()
              if not text:
                  return None

              text = text.replace(" ", "T")

              if text.endswith("Z"):
                  text = text[:-1] + "+00:00"

              try:
                  dt = datetime.fromisoformat(text)
                  if dt.tzinfo is None:
                      dt = dt.replace(tzinfo=timezone.utc)
                  return dt.astimezone(timezone.utc)
              except Exception:
                  return None

          def thresholds_minutes(timeframe):
              tf = str(timeframe).upper()

              if tf == "M15":
                  return 120, 360, 1440

              if tf == "H1":
                  return 240, 1440, 4320

              return 240, 1440, 4320

          def classify_freshness(timeframe, latest_dt):
              if latest_dt is None:
                  return "TIMESTAMP_NOT_FOUND_CAVEATED", None, "no_parseable_timestamp_from_twelvedata"

              age_minutes = round((now_utc() - latest_dt).total_seconds() / 60.0, 2)

              if age_minutes < -30:
                  return "TIMESTAMP_IN_FUTURE_CAVEATED", age_minutes, "provider_timestamp_is_in_future"

              fresh, stale, very_stale = thresholds_minutes(timeframe)

              if now_utc().weekday() in [5, 6] and age_minutes <= 4320:
                  return "MARKET_CLOSED_OR_WEEKEND_CAVEATED", age_minutes, "utc_weekend_or_market_closed_caveat"

              if age_minutes <= fresh:
                  return "FRESH", age_minutes, "provider_timestamp_within_fresh_threshold"

              if age_minutes <= stale:
                  return "STALE", age_minutes, "provider_timestamp_beyond_fresh_threshold"

              if age_minutes <= very_stale:
                  return "VERY_STALE", age_minutes, "provider_timestamp_beyond_stale_threshold"

              return "VERY_STALE", age_minutes, "provider_timestamp_extremely_old"

          def fetch_surface(surface):
              if not API_KEY:
                  return {
                      **surface,
                      "fetch_status": "BLOCKED_MISSING_TWELVE_DATA_API_KEY",
                      "provider_datetime_raw": None,
                      "latest_provider_datetime_utc": None,
                      "freshness_status": "UNAVAILABLE",
                      "freshness_age_minutes": None,
                      "freshness_reason": "missing_github_secret_LFB_TWELVE_DATA_API_KEY_or_TWELVE_DATA_API_KEY",
                      "provider_error_message": None
                  }

              params = {
                  "symbol": surface["symbol"],
                  "interval": surface["interval"],
                  "outputsize": "1",
                  "timezone": "UTC",
                  "apikey": API_KEY
              }

              url = "https://api.twelvedata.com/time_series?" + urllib.parse.urlencode(params)

              try:
                  req = urllib.request.Request(
                      url,
                      headers={"User-Agent": "PRV1-SIG-Brain-ReadOnly/1.0"}
                  )

                  with urllib.request.urlopen(req, timeout=30) as resp:
                      raw = resp.read().decode("utf-8")

                  data = json.loads(raw)

                  if isinstance(data, dict) and data.get("status") == "error":
                      return {
                          **surface,
                          "fetch_status": "PROVIDER_ERROR",
                          "provider_datetime_raw": None,
                          "latest_provider_datetime_utc": None,
                          "freshness_status": "UNAVAILABLE",
                          "freshness_age_minutes": None,
                          "freshness_reason": "provider_returned_error",
                          "provider_error_message": data.get("message") or data.get("code")
                      }

                  values = data.get("values") if isinstance(data, dict) else None

                  if not values:
                      return {
                          **surface,
                          "fetch_status": "NO_VALUES_RETURNED",
                          "provider_datetime_raw": None,
                          "latest_provider_datetime_utc": None,
                          "freshness_status": "UNAVAILABLE",
                          "freshness_age_minutes": None,
                          "freshness_reason": "provider_returned_no_values",
                          "provider_error_message": None
                      }

                  first = values[0]
                  dt_raw = first.get("datetime") or first.get("timestamp")
                  dt = parse_dt(dt_raw)

                  freshness_status, age_minutes, reason = classify_freshness(surface["timeframe"], dt)

                  return {
                      **surface,
                      "fetch_status": "OK",
                      "provider_datetime_raw": dt_raw,
                      "latest_provider_datetime_utc": iso(dt) if dt else None,
                      "freshness_status": freshness_status,
                      "freshness_age_minutes": age_minutes,
                      "freshness_reason": reason,
                      "provider_error_message": None
                  }

              except Exception as exc:
                  return {
                      **surface,
                      "fetch_status": "FETCH_EXCEPTION",
                      "provider_datetime_raw": None,
                      "latest_provider_datetime_utc": None,
                      "freshness_status": "UNAVAILABLE",
                      "freshness_age_minutes": None,
                      "freshness_reason": "exception_during_read_only_fetch",
                      "provider_error_message": str(exc)[:300]
                  }

          def maybe_adjust_state(card, freshness_status):
              current = card.get("brain_state", "UNKNOWN")

              if current in {"PARKED_NOT_ACTIVE", "SUPPORT_CONTEXT_ONLY"}:
                  return current

              if freshness_status == "UNAVAILABLE":
                  return "DATA_UNAVAILABLE_NO_SIGNAL"

              if freshness_status in {"STALE", "VERY_STALE"}:
                  return "STALE_CONTEXT_NO_SIGNAL"

              return current

          payload = read_json(PAYLOAD, {
              "program": "SIG_BRAIN_RUNTIME1_DYNAMIC_DISPLAY_ONLY",
              "created_at_utc": iso(now_utc()),
              "authority": "DISPLAY_ONLY_NOT_SIGNAL",
              "runtime_mode": "payload_missing",
              "prv1_evidence_files": [],
              "signal_authorized": False,
              "broker_execution_authorized": False,
              "forward_shadow_authorized": False,
              "action_surface_authorized": False,
              "cards": []
          })

          feed_results = [fetch_surface(s) for s in SURFACES]
          by_surface = {r["surface"]: r for r in feed_results}

          cards = payload.get("cards", [])

          for card in cards:
              result = by_surface.get(card.get("surface"))

              if not result:
                  continue

              card["live_feed1_fetch_status"] = result["fetch_status"]
              card["latest_provider_datetime_utc"] = result["latest_provider_datetime_utc"]
              card["freshness_status"] = result["freshness_status"]
              card["freshness_age_minutes"] = result["freshness_age_minutes"]
              card["freshness_reason"] = result["freshness_reason"]
              card["provider_symbol"] = result["symbol"]
              card["provider_interval"] = result["interval"]
              card["brain_state_before_live_feed1"] = card.get("brain_state")
              card["brain_state"] = maybe_adjust_state(card, result["freshness_status"])

              caveats = card.get("caveats", [])

              if result["fetch_status"] != "OK":
                  caveats.append("LIVE_FEED1_PROVIDER_FETCH_NOT_OK")

              if result["freshness_status"] in {
                  "TIMESTAMP_NOT_FOUND_CAVEATED",
                  "TIMESTAMP_IN_FUTURE_CAVEATED",
                  "MARKET_CLOSED_OR_WEEKEND_CAVEATED"
              }:
                  caveats.append("LIVE_FEED1_" + result["freshness_status"])

              if result["freshness_status"] in {"STALE", "VERY_STALE"}:
                  caveats.append("LIVE_FEED1_STALE_CONTEXT_BLOCKS_ACTIVE_RUNTIME_STATE")

              card["caveats"] = sorted(set(caveats))

              blockers = card.get("blockers", [])

              if result["freshness_status"] == "UNAVAILABLE":
                  blockers.append("LIVE_FEED1_UNAVAILABLE_NO_SIGNAL")

              if result["freshness_status"] in {"STALE", "VERY_STALE"}:
                  blockers.append("LIVE_FEED1_STALE_CONTEXT_NO_SIGNAL")

              card["blockers"] = sorted(set(blockers))

          payload["program"] = "SIG_BRAIN_RUNTIME1_DYNAMIC_DISPLAY_ONLY_PLUS_LIVE_FEED1"
          payload["live_feed1_applied_at_utc"] = iso(now_utc())
          payload["prv1_evidence_files"] = sorted(set(
              payload.get("prv1_evidence_files", []) +
              ["reports/prv1_live_feed1_twelvedata_timestamp_report.json"]
          ))
          payload["signal_authorized"] = False
          payload["broker_execution_authorized"] = False
          payload["forward_shadow_authorized"] = False
          payload["action_surface_authorized"] = False
          payload["cards"] = cards

          proof = {
              "status": "PASS",
              "program": "PRV1_LIVE_FEED1_TWELVE_DATA_TIMESTAMP",
              "scope": "read_only_latest_timestamp_feed",
              "applied_at_utc": iso(now_utc()),
              "api_key_present": bool(API_KEY),
              "surfaces_checked": len(feed_results),
              "fetch_ok_count": sum(1 for r in feed_results if r["fetch_status"] == "OK"),
              "timestamp_found_count": sum(1 for r in feed_results if r["latest_provider_datetime_utc"]),
              "fetch_problem_count": sum(1 for r in feed_results if r["fetch_status"] != "OK"),
              "signal_authorized": False,
              "broker_execution_authorized": False,
              "forward_shadow_authorized": False,
              "action_surface_authorized": False,
              "forbidden_state_count": 0
          }

          forbidden = {
              "BUY",
              "SELL",
              "HOLD",
              "ENTRY",
              "STOP",
              "TARGET",
              "BROKER_EXECUTION",
              "SIGNAL_AUTHORIZED"
          }

          for c in cards:
              if c.get("brain_state") in forbidden:
                  proof["status"] = "FAIL"
                  proof["forbidden_state_count"] += 1

          report = {
              "program": "PRV1_LIVE_FEED1_TWELVE_DATA_TIMESTAMP",
              "applied_at_utc": proof["applied_at_utc"],
              "provider": "twelve_data",
              "secret_used": "LFB_TWELVE_DATA_API_KEY_or_TWELVE_DATA_API_KEY_present" if API_KEY else "missing",
              "results": feed_results,
              "proof": proof,
              "forbidden_interpretation": [
                  "not_signal",
                  "not_buy_sell_hold",
                  "not_entry_stop_target",
                  "not_broker_execution",
                  "not_forward_shadow_activation",
                  "not_tradability_claim"
              ]
          }

          write_json(PAYLOAD, payload)
          write_json(REPORT, report)
          write_json(PROOF, proof)

          if proof["status"] != "PASS":
              raise SystemExit("PRV1 LIVE FEED1 proof failed")
          PY

      - name: Commit LIVE FEED1 timestamp report and updated payload
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add personal_runtime_v1_latest_product/payloads/sig_brain_state_current.json
          git add personal_runtime_v1_latest_product/reports/prv1_live_feed1_twelvedata_timestamp_report.json
          git add personal_runtime_v1_latest_product/proofs/prv1_live_feed1_proof.json

          git commit -m "Apply PRV1 LIVE FEED1 Twelve Data timestamp feed" || echo "No changes to commit"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
