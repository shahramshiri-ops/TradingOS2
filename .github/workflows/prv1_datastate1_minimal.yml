name: PRV1 DATASTATE1 Minimal Market State

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: prv1-datastate1-minimal
  cancel-in-progress: true

jobs:
  build-datastate:
    runs-on: ubuntu-latest

    env:
      TD_API_KEY_PRIMARY: ${{ secrets.LFB_TWELVE_DATA_API_KEY }}
      TD_API_KEY_ALT: ${{ secrets.TWELVE_DATA_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build minimal live market state
        uses: actions/github-script@v7
        env:
          TD_API_KEY_PRIMARY: ${{ secrets.LFB_TWELVE_DATA_API_KEY }}
          TD_API_KEY_ALT: ${{ secrets.TWELVE_DATA_API_KEY }}
        with:
          script: |
            const fs = require("fs");

            const apiKey = process.env.TD_API_KEY_PRIMARY || process.env.TD_API_KEY_ALT || "";

            const surfaces = [
              ["EURUSD", "H1", "EURUSD_H1", "EUR/USD", "1h", "london_overlap_directional_persistence", "RESEARCH_ACTIVE"],
              ["USDJPY", "H1", "USDJPY_H1", "USD/JPY", "1h", "trend_session_continuity", "RESEARCH_ACTIVE_WITH_DATA_QUALITY_CAVEAT"],
              ["XAUUSD", "M15", "XAUUSD_M15", "XAU/USD", "15min", "event_session_range_expansion", "PARKED_FOR_PORTFOLIO_BALANCE"],
              ["EURUSD", "M15", "EURUSD_M15", "EUR/USD", "15min", "low_vol_compression_full_domain_display_contract", "PARKED_DISPLAY_CONTRACT_CLOSED"],
              ["USDJPY", "M15", "USDJPY_M15", "USD/JPY", "15min", "asia_range_neutral_full_asia", "PARKED_DIAGNOSTIC_COMPLETE_FOR_NOW"],
              ["XAUUSD", "H1", "XAUUSD_H1", "XAU/USD", "1h", "risk_off_candidate_flow_context", "SUPPORT_CONTEXT_ONLY"]
            ];

            function mkdirp(p) {
              fs.mkdirSync(p, { recursive: true });
            }

            function writeJson(path, obj) {
              const dir = path.split("/").slice(0, -1).join("/");
              if (dir) mkdirp(dir);
              fs.writeFileSync(path, JSON.stringify(obj, null, 2), "utf8");
            }

            function nowUtc() {
              return new Date().toISOString().replace(/\.\d{3}Z$/, "Z");
            }

            function num(x) {
              const v = Number(x);
              return Number.isFinite(v) ? v : null;
            }

            function round(x) {
              return Number.isFinite(x) ? Number(x.toFixed(6)) : null;
            }

            function direction(changePct) {
              if (!Number.isFinite(changePct)) return "UNKNOWN";
              if (changePct > 0.03) return "UP";
              if (changePct < -0.03) return "DOWN";
              return "FLAT";
            }

            function sessionBucket(datetimeText) {
              const d = new Date(String(datetimeText).replace(" ", "T") + "Z");
              if (Number.isNaN(d.getTime())) return "UNKNOWN_SESSION";
              const h = d.getUTCHours();
              if (h < 7) return "ASIA";
              if (h < 12) return "LONDON";
              if (h < 16) return "LONDON_NY_OVERLAP";
              if (h < 21) return "NEW_YORK";
              return "ROLLOVER_OR_THIN_LIQUIDITY";
            }

            function rangeRegime(latestRange, avgRange) {
              if (!Number.isFinite(latestRange) || !Number.isFinite(avgRange) || avgRange <= 0) {
                return "UNKNOWN_RANGE_REGIME";
              }
              const ratio = latestRange / avgRange;
              if (ratio < 0.65) return "COMPRESSED";
              if (ratio > 1.5) return "EXPANDED";
              return "NORMAL";
            }

            function candidateContext(surface, session, momentum3, regime) {
              const surfaceId = surface[2];
              const lifecycle = surface[6];

              if (lifecycle.startsWith("PARKED")) {
                return ["PARKED_CONTEXT_ONLY", "research_path_is_parked_or_complete_for_now"];
              }

              if (lifecycle === "SUPPORT_CONTEXT_ONLY") {
                return ["SUPPORT_CONTEXT_ONLY", "context_layer_cannot_create_signal"];
              }

              if (surfaceId === "EURUSD_H1") {
                const goodSession = session === "LONDON" || session === "LONDON_NY_OVERLAP";
                const directional = momentum3 === "UP" || momentum3 === "DOWN";

                if (goodSession && directional) {
                  return ["CONTEXT_PRESENT_DISPLAY_ONLY", "active_session_and_directional_recent_momentum"];
                }

                if (!goodSession) {
                  return ["SESSION_OUT_OF_FOCUS_DISPLAY_ONLY", "eurusd_h1_prefers_london_or_overlap_context"];
                }

                return ["CONTEXT_WEAK_OR_FLAT_DISPLAY_ONLY", "recent_momentum_not_directional_enough"];
              }

              if (surfaceId === "USDJPY_H1") {
                const directional = momentum3 === "UP" || momentum3 === "DOWN";

                if (directional && regime !== "EXPANDED") {
                  return ["CONTEXT_PRESENT_WITH_DATA_QUALITY_CAVEAT", "directional_recent_momentum_but_data_quality_caveat_remains"];
                }

                return ["CONTEXT_WEAK_OR_CAVEATED_DISPLAY_ONLY", "not_directional_enough_or_range_expanded"];
              }

              return ["CONTEXT_RECORDED_DISPLAY_ONLY", "market_state_recorded_without_signal_authority"];
            }

            async function fetchSurface(surface) {
              const [instrument, timeframe, surfaceId, symbol, interval, family, lifecycle] = surface;

              if (!apiKey) {
                return {
                  instrument,
                  timeframe,
                  surface: surfaceId,
                  candidate_family: family,
                  lifecycle,
                  market_state_status: "UNAVAILABLE",
                  fetch_status: "BLOCKED_MISSING_TWELVE_DATA_API_KEY",
                  bar_count: 0,
                  display_authority: "MARKET_STATE_DISPLAY_ONLY_NOT_SIGNAL"
                };
              }

              const url = new URL("https://api.twelvedata.com/time_series");
              url.searchParams.set("symbol", symbol);
              url.searchParams.set("interval", interval);
              url.searchParams.set("outputsize", "12");
              url.searchParams.set("timezone", "UTC");
              url.searchParams.set("apikey", apiKey);

              try {
                const res = await fetch(url);
                const data = await res.json();

                if (data.status === "error") {
                  return {
                    instrument,
                    timeframe,
                    surface: surfaceId,
                    candidate_family: family,
                    lifecycle,
                    market_state_status: "UNAVAILABLE",
                    fetch_status: "PROVIDER_ERROR",
                    provider_error_message: data.message || data.code || "provider_error",
                    bar_count: 0,
                    display_authority: "MARKET_STATE_DISPLAY_ONLY_NOT_SIGNAL"
                  };
                }

                const values = Array.isArray(data.values) ? data.values : [];

                const bars = values.map(row => {
                  const open = num(row.open);
                  const high = num(row.high);
                  const low = num(row.low);
                  const close = num(row.close);

                  if (open === null || high === null || low === null || close === null) return null;

                  return {
                    datetime: row.datetime || row.timestamp,
                    open,
                    high,
                    low,
                    close,
                    range: high - low
                  };
                }).filter(Boolean).reverse();

                if (!bars.length) {
                  return {
                    instrument,
                    timeframe,
                    surface: surfaceId,
                    candidate_family: family,
                    lifecycle,
                    market_state_status: "UNAVAILABLE",
                    fetch_status: "NO_VALUES_RETURNED",
                    bar_count: 0,
                    display_authority: "MARKET_STATE_DISPLAY_ONLY_NOT_SIGNAL"
                  };
                }

                const latest = bars[bars.length - 1];
                const closeNow = latest.close;
                const close3 = bars.length >= 4 ? bars[bars.length - 4].close : null;
                const change3 = close3 ? ((closeNow - close3) / close3) * 100 : null;

                const ranges = bars.map(b => b.range).filter(Number.isFinite);
                const avgRange = ranges.length ? ranges.reduce((a, b) => a + b, 0) / ranges.length : null;

                const momentum3 = direction(change3);
                const session = sessionBucket(latest.datetime);
                const regime = rangeRegime(latest.range, avgRange);
                const ctx = candidateContext(surface, session, momentum3, regime);

                return {
                  instrument,
                  timeframe,
                  surface: surfaceId,
                  provider_symbol: symbol,
                  provider_interval: interval,
                  candidate_family: family,
                  lifecycle,
                  market_state_status: "OK",
                  fetch_status: "OK",
                  bar_count: bars.length,
                  latest_bar_time_utc: latest.datetime,
                  latest_open: round(latest.open),
                  latest_high: round(latest.high),
                  latest_low: round(latest.low),
                  latest_close: round(latest.close),
                  latest_range: round(latest.range),
                  avg_range_12: round(avgRange),
                  range_regime: regime,
                  change_3bar_pct: round(change3),
                  momentum_direction_3bar: momentum3,
                  session_bucket_utc: session,
                  candidate_context_status: ctx[0],
                  candidate_context_reason: ctx[1],
                  display_authority: "MARKET_STATE_DISPLAY_ONLY_NOT_SIGNAL"
                };
              } catch (e) {
                return {
                  instrument,
                  timeframe,
                  surface: surfaceId,
                  candidate_family: family,
                  lifecycle,
                  market_state_status: "UNAVAILABLE",
                  fetch_status: "FETCH_EXCEPTION",
                  provider_error_message: String(e).slice(0, 250),
                  bar_count: 0,
                  display_authority: "MARKET_STATE_DISPLAY_ONLY_NOT_SIGNAL"
                };
              }
            }

            const marketStates = {};
            const results = [];

            for (const surface of surfaces) {
              const state = await fetchSurface(surface);
              marketStates[state.surface] = state;
              results.push({
                surface: state.surface,
                fetch_status: state.fetch_status,
                market_state_status: state.market_state_status,
                bar_count: state.bar_count,
                candidate_context_status: state.candidate_context_status || "NOT_CHECKED"
              });
            }

            const datastate = {
              program: "PRV1_DATASTATE1_MINIMAL_MARKET_STATE",
              created_at_utc: nowUtc(),
              authority: "LIVE_MARKET_STATE_DISPLAY_ONLY_NOT_SIGNAL",
              api_key_present: Boolean(apiKey),
              surface_count: surfaces.length,
              market_states: marketStates,
              forbidden_interpretation: [
                "not_signal",
                "not_buy_sell_hold",
                "not_entry_stop_target",
                "not_broker_execution",
                "not_forward_shadow_activation",
                "not_tradability_claim"
              ]
            };

            const proof = {
              status: "PASS",
              program: "PRV1_DATASTATE1_MINIMAL_MARKET_STATE",
              created_at_utc: nowUtc(),
              api_key_present: Boolean(apiKey),
              surfaces_checked: surfaces.length,
              fetch_ok_count: results.filter(r => r.fetch_status === "OK").length,
              market_state_ok_count: results.filter(r => r.market_state_status === "OK").length,
              signal_authorized: false,
              broker_execution_authorized: false,
              forward_shadow_authorized: false,
              action_surface_authorized: false
            };

            const report = {
              program: "PRV1_DATASTATE1_MINIMAL_MARKET_STATE",
              created_at_utc: nowUtc(),
              results,
              proof
            };

            writeJson("datastate/prv1_datastate1_current.json", datastate);
            writeJson("personal_runtime_v1_latest_product/datastate/prv1_datastate1_current.json", datastate);
            writeJson("reports/prv1_datastate1_report.json", report);
            writeJson("personal_runtime_v1_latest_product/reports/prv1_datastate1_report.json", report);
            writeJson("proofs/prv1_datastate1_proof.json", proof);
            writeJson("personal_runtime_v1_latest_product/proofs/prv1_datastate1_proof.json", proof);

      - name: Commit minimal datastate outputs
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add datastate/prv1_datastate1_current.json
          git add personal_runtime_v1_latest_product/datastate/prv1_datastate1_current.json
          git add reports/prv1_datastate1_report.json
          git add personal_runtime_v1_latest_product/reports/prv1_datastate1_report.json
          git add proofs/prv1_datastate1_proof.json
          git add personal_runtime_v1_latest_product/proofs/prv1_datastate1_proof.json

          git commit -m "Build PRV1 DATASTATE1 minimal market state" || echo "No changes to commit"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
