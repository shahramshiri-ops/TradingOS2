name: PRV1 Daily Runtime Mobile Panel

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      trigger_source:
        description: "Source of manual trigger"
        required: false
        default: "manual"
      requested_at_utc:
        description: "UTC timestamp supplied by mobile refresh worker"
        required: false
        default: ""

permissions:
  contents: read
  pages: write
  id-token: write

env:
  LFB_TWELVE_DATA_API_KEY: ${{ secrets.LFB_TWELVE_DATA_API_KEY }}
  MOBILE_REFRESH_WORKER_URL: ${{ vars.MOBILE_REFRESH_WORKER_URL }}
  GITHUB_PAGES_URL: https://shahramshiri-ops.github.io/TradingOS2/

jobs:
  run-daily-runtime-and-deploy:
    runs-on: windows-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run PRV1 daily runtime
        shell: cmd
        run: RUN_DAILY.bat

      - name: Validate daily runtime
        shell: cmd
        run: python scripts\validate_daily_runtime_outputs.py .

      - name: Generate mobile Pages site with real refresh button
        shell: cmd
        run: python scripts\generate_mobile_pages_site_with_real_refresh_button.py .

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
