name: PRV1 SIG Brain Web Installer — Mobile Only

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install-prv1-sigbrain-upgrade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Install PRV1 SIG Brain upgrade files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "scripts/adapt_prv1_live_to_sig_brain.py")"
          cat > "scripts/adapt_prv1_live_to_sig_brain.py" <<'EOF_73301dfc16'
