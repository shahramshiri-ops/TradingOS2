          #!/usr/bin/env python3
          from __future__ import annotations
          import argparse,json,re
          from pathlib import Path
          BAD_KEYS={'broker_status','execution_queue','action_buttons','position_instruction','entry','stop','target','pnl','win_loss','allocation','order_ticket','position_size'}
          
          def read_json(p,default=None):
              if default is None: default={}
              try:
                  if Path(p).exists(): return json.loads(Path(p).read_text(encoding='utf-8'))
              except Exception: return default
              return default
          
          def walk(x,path=''):
              hits=[]
              if isinstance(x,dict):
                  for k,v in x.items():
                      if str(k).lower() in BAD_KEYS: hits.append(path+'/'+str(k))
                      hits+=walk(v,path+'/'+str(k))
              elif isinstance(x,list):
                  for i,v in enumerate(x): hits+=walk(v,path+f'[{i}]')
              return hits
          
          def main():
              ap=argparse.ArgumentParser(); ap.add_argument('root',nargs='?',default='.'); args=ap.parse_args(); root=Path(args.root).resolve()
              payload=read_json(root/'panel/sig_brain_state_current.json')
              adapter=read_json(root/'proofs/prv1_sigbrain_adapter_proof.json')
              gen=read_json(root/'proofs/prv1_sigbrain_mobile_generation_proof.json')
              html=(root/'public/index.html').read_text(encoding='utf-8',errors='ignore') if (root/'public/index.html').exists() else ''
              hits=walk(payload)
              cards=payload.get('brain_cards') or []
              ok=bool(payload) and bool(cards) and not hits and payload.get('summary',{}).get('signal_authorized') is False and adapter.get('status')=='PASS' and gen.get('status')=='PASS' and 'NO BUY/SELL/HOLD' in html
              proof={'program':'PRV1SIGBRAIN-UPGRADE1','artifact':'prv1_sigbrain_upgrade_validation_proof','status':'PASS' if ok else 'FAIL','cards_checked':len(cards),'forbidden_key_hits':hits,'signal_authorized':False,'forward_shadow_authorized':False,'broker_execution_authorized':False,'action_surface_authorized':False,'prv1_live_fetch_preserved':adapter.get('prv1_live_fetch_preserved') is True,'public_index_exists':bool(html)}
              out=root/'proofs/prv1_sigbrain_upgrade_validation_proof.json'; out.parent.mkdir(exist_ok=True); out.write_text(json.dumps(proof,ensure_ascii=False,indent=2),encoding='utf-8')
              print(json.dumps(proof,ensure_ascii=False))
              if not ok: raise SystemExit(1)
          if __name__=='__main__': main()
