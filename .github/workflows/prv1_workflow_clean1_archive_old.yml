name: PRV1 WORKFLOW CLEAN1 Archive Old Workflows

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  archive-old-workflows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Archive conflicting old workflows
        shell: bash
        run: |
          set -e

          mkdir -p archived_workflows/prv1_sigbrain_old

          move_if_exists () {
            local FILE="$1"
            if [ -f ".github/workflows/$FILE" ]; then
              echo "Archiving $FILE"
              git mv ".github/workflows/$FILE" "archived_workflows/prv1_sigbrain_old/$FILE"
            else
              echo "Not found, skipping: $FILE"
            fi
          }

          move_if_exists "sig_brain_runtime1_dynamic_display_only.yml"
          move_if_exists "prv1_live_fresh1_freshness_patch.yml"
          move_if_exists "sig_obsjournal1_display_only_brain_state_journal.yml"
          move_if_exists "prv1_brain_orch1_unified_runtime.yml"
          move_if_exists "prv1_pathfix1_root_pages_mirror.yml"

          cat > archived_workflows/prv1_sigbrain_old/README.md <<'TXT'
          # Archived PRV1 / SIG Brain workflows

          These workflows were archived because the stable runtime path is now:

          PRV1 AUTO REFRESH1 Master
          -> PRV1 LIVE FEED1 Twelve Data Timestamp Feed
          -> PRV1 JOURNAL FIX1 From Current Payload
          -> PRV1 PAGES RESTORE1 Restore Working SIG Brain Pages

          Archived workflows should not run on schedule because they may overwrite
          the current payload, journal, or Pages artifact.

          Boundary:
          DISPLAY ONLY / NOT SIGNAL / NO BROKER / NO EXECUTION / NO SHADOW ACTIVATION
          TXT

      - name: Commit archived workflows
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .github/workflows archived_workflows/prv1_sigbrain_old
          git commit -m "Archive old PRV1 SIG Brain workflows after master refresh stabilization" || echo "No changes to commit"
          git push
