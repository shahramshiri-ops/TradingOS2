name: PRV1 DATASTATE1 Live Market State

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: prv1-datastate1-pages
  cancel-in-progress: true

jobs:
  build-live-market-state:
    runs-on: ubuntu-latest

    env:
      TD_API_KEY_PRIMARY: ${{ secrets.LFB_TWELVE_DATA_API_KEY }}
      TD_API_KEY_ALT: ${{ secrets.TWELVE_DATA_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build live market state safely
        uses: actions/github-script@v7
        env:
          TD_API_KEY_PRIMARY: ${{ secrets.LFB_TWELVE_DATA_API_KEY }}
          TD_API_KEY_ALT: ${{ secrets.TWELVE_DATA_API_KEY }}
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const apiKey = process.env.TD_API_KEY_PRIMARY || process.env.TD_API_KEY_ALT || "";

            const surfaces = [
              {
                instrument: "EURUSD",
                timeframe: "H1",
                surface: "EURUSD_H1",
                symbol: "EUR/USD",
                interval: "1h",
                candidate_family: "london_overlap_directional_persistence",
                lifecycle: "RESEARCH_ACTIVE"
              },
              {
                instrument: "USDJPY",
                timeframe: "H1",
                surface: "USDJPY_H1",
                symbol: "USD/JPY",
                interval: "1h",
                candidate_family: "trend_session_continuity",
                lifecycle: "RESEARCH_ACTIVE_WITH_DATA_QUALITY_CAVEAT"
              },
              {
                instrument: "XAUUSD",
                timeframe: "M15",
                surface: "XAUUSD_M15",
                symbol: "XAU/USD",
                interval: "15min",
                candidate_family: "event_session_range_expansion",
                lifecycle: "PARKED_FOR_PORTFOLIO_BALANCE"
              },
              {
                instrument: "EURUSD",
                timeframe: "M15",
                surface: "EURUSD_M15",
                symbol: "EUR/USD",
                interval: "15min",
                candidate_family: "low_vol_compression_full_domain_display_contract",
                lifecycle: "PARKED_DISPLAY_CONTRACT_CLOSED"
              },
              {
                instrument: "USDJPY",
                timeframe: "M15",
                surface: "USDJPY_M15",
                symbol: "USD/JPY",
                interval: "15min",
                candidate_family: "asia_range_neutral_full_asia",
                lifecycle: "PARKED_DIAGNOSTIC_COMPLETE_FOR_NOW"
              },
              {
                instrument: "XAUUSD",
                timeframe: "H1",
                surface: "XAUUSD_H1",
                symbol: "XAU/USD",
                interval: "1h",
                candidate_family: "risk_off_candidate_flow_context",
                lifecycle: "SUPPORT_CONTEXT_ONLY"
              }
            ];

            function mkdirp(p) {
              fs.mkdirSync(p, { recursive: true });
            }

            function nowUtc() {
              return new Date().toISOString().replace(/\.\d{3}Z$/, "Z");
            }

            function readJson(p, fallback = {}) {
              try {
                if (fs.existsSync(p)) {
                  return JSON.parse(fs.readFileSync(p, "utf8"));
                }
              } catch (e) {}
              return fallback;
            }

            function writeJson(p, data) {
              mkdirp(path.dirname(p));
              fs.writeFileSync(p, JSON.stringify(data, null, 2), "utf8");
            }

            function parseDt(raw) {
              if (!raw) return null;
              let t = String(raw).trim();
              if (!t) return null;
              t = t.replace(" ", "T");
              if (!/[zZ]|[+-]\d\d:?\d\d$/.test(t)) t = t + "Z";
              const d = new Date(t);
              if (Number.isNaN(d.getTime())) return null;
              return d;
            }

            function num(x) {
              const n = Number(x);
              return Number.isFinite(n) ? n : null;
            }

            function round(x, n = 6) {
              if (x === null || x === undefined || !Number.isFinite(Number(x))) return null;
              return Number(Number(x).toFixed(n));
            }

            function avg(xs) {
              const good = xs.filter(x => x !== null && x !== undefined && Number.isFinite(Number(x)));
              if (!good.length) return null;
              return good.reduce((a, b) => a + b, 0) / good.length;
            }

            function pctChange(a, b) {
              if (a === null || b === null || b === 0) return null;
              return ((a - b) / b) * 100;
            }

            function direction(pct, flatThreshold = 0.03) {
              if (pct === null || pct === undefined) return "UNKNOWN";
              if (pct > flatThreshold) return "UP";
              if (pct < -flatThreshold) return "DOWN";
              return "FLAT";
            }

            function rangeRegime(latestRange, avgRange12) {
              if (!latestRange || !avgRange12 || avgRange12 <= 0) return "UNKNOWN_RANGE_REGIME";
              const ratio = latestRange / avgRange12;
              if (ratio < 0.65) return "COMPRESSED";
              if (ratio > 1.5) return "EXPANDED";
              return "NORMAL";
            }

            function sessionBucketUtc(dt) {
              if (!dt) return "UNKNOWN_SESSION";
              const h = dt.getUTCHours();
              if (h >= 0 && h < 7) return "ASIA";
              if (h >= 7 && h < 12) return "LONDON";
              if (h >= 12 && h < 16) return "LONDON_NY_OVERLAP";
              if (h >= 16 && h < 21) return "NEW_YORK";
              return "ROLLOVER_OR_THIN_LIQUIDITY";
            }

            async function fetchBars(surface) {
              if (!apiKey) {
                return {
                  fetch_status: "BLOCKED_MISSING_TWELVE_DATA_API_KEY",
                  bars: [],
                  provider_error_message: "missing secret LFB_TWELVE_DATA_API_KEY or TWELVE_DATA_API_KEY"
                };
              }

              const url = new URL("https://api.twelvedata.com/time_series");
              url.searchParams.set("symbol", surface.symbol);
              url.searchParams.set("interval", surface.interval);
              url.searchParams.set("outputsize", "48");
              url.searchParams.set("timezone", "UTC");
              url.searchParams.set("apikey", apiKey);

              try {
                const res = await fetch(url, {
                  headers: { "User-Agent": "PRV1-SIG-Brain-ReadOnly/1.0" }
                });

                const data = await res.json();

                if (data && data.status === "error") {
                  return {
                    fetch_status: "PROVIDER_ERROR",
                    bars: [],
                    provider_error_message: data.message || data.code || "provider_error"
                  };
                }

                const values = Array.isArray(data.values) ? data.values : [];

                if (!values.length) {
                  return {
                    fetch_status: "NO_VALUES_RETURNED",
                    bars: [],
                    provider_error_message: null
                  };
                }

                const bars = values.map(row => {
                  const dt = parseDt(row.datetime || row.timestamp);
                  const open = num(row.open);
                  const high = num(row.high);
                  const low = num(row.low);
                  const close = num(row.close);

                  if (!dt || open === null || high === null || low === null || close === null) return null;

                  return {
                    datetime_utc: dt.toISOString().replace(/\.\d{3}Z$/, "Z"),
                    open,
                    high,
                    low,
                    close,
                    range: high - low
                  };
                }).filter(Boolean).sort((a, b) => new Date(a.datetime_utc) - new Date(b.datetime_utc));

                return {
                  fetch_status: "OK",
                  bars,
                  provider_error_message: null
                };
              } catch (e) {
                return {
                  fetch_status: "FETCH_EXCEPTION",
                  bars: [],
                  provider_error_message: String(e).slice(0, 300)
                };
              }
            }

            function candidateContext(surface, state) {
              const lifecycle = surface.lifecycle;
              const session = state.session_bucket_utc;
              const dir3 = state.momentum_direction_3bar;
              const rr = state.range_regime;

              if (lifecycle.startsWith("PARKED")) {
                return {
                  candidate_context_status: "PARKED_CONTEXT_ONLY",
                  candidate_context_reason: "research_path_is_parked_or_complete_for_now"
                };
              }

              if (lifecycle === "SUPPORT_CONTEXT_ONLY") {
                return {
                  candidate_context_status: "SUPPORT_CONTEXT_ONLY",
                  candidate_context_reason: "context_layer_cannot_create_signal"
                };
              }

              if (surface.surface === "EURUSD_H1") {
                if ((session === "LONDON" || session === "LONDON_NY_OVERLAP") && (dir3 === "UP" || dir3 === "DOWN")) {
                  return {
                    candidate_context_status: "CONTEXT_PRESENT_DISPLAY_ONLY",
                    candidate_context_reason: "eurusd_h1_active_session_and_directional_recent_momentum"
                  };
                }

                if (!(session === "LONDON" || session === "LONDON_NY_OVERLAP")) {
                  return {
                    candidate_context_status: "SESSION_OUT_OF_FOCUS_DISPLAY_ONLY",
                    candidate_context_reason: "eurusd_h1_family_prefers_london_or_overlap_context"
                  };
                }

                return {
                  candidate_context_status: "CONTEXT_WEAK_OR_FLAT_DISPLAY_ONLY",
                  candidate_context_reason: "eurusd_h1_recent_momentum_not_directional_enough"
                };
              }

              if (surface.surface === "USDJPY_H1") {
                if ((dir3 === "UP" || dir3 === "DOWN") && rr !== "EXPANDED") {
                  return {
                    candidate_context_status: "CONTEXT_PRESENT_WITH_DATA_QUALITY_CAVEAT",
                    candidate_context_reason: "usdjpy_h1_directional_recent_momentum_but_data_quality_caveat_remains"
                  };
                }

                return {
                  candidate_context_status: "CONTEXT_WEAK_OR_CAVEATED_DISPLAY_ONLY",
                  candidate_context_reason: "usdjpy_h1_context_not_strong_enough_or_range_expanded"
                };
              }

              return {
                candidate_context_status: "CONTEXT_RECORDED_DISPLAY_ONLY",
                candidate_context_reason: "generic_market_state_recorded_without_signal_authority"
              };
            }

            function buildState(surface, bars, fetchStatus, errorMessage) {
              if (!bars.length) {
                return {
                  market_state_status: "UNAVAILABLE",
                  instrument: surface.instrument,
                  timeframe: surface.timeframe,
                  surface: surface.surface,
                  candidate_family: surface.candidate_family,
                  lifecycle: surface.lifecycle,
                  fetch_status: fetchStatus,
                  provider_error_message: errorMessage,
                  bar_count: 0,
                  candidate_context_status: "NOT_CHECKED",
                  candidate_context_reason: "no_bars_available",
                  display_authority: "MARKET_STATE_DISPLAY_ONLY_NOT_SIGNAL"
                };
              }

              const closes = bars.map(b => b.close);
              const ranges = bars.map(b => b.range);
              const latest = bars[bars.length - 1];

              const latestClose = latest.close;
              const prevClose = closes.length >= 2 ? closes[closes.length - 2] : null;
              const close3 = closes.length >= 4 ? closes[closes.length - 4] : null;
              const close6 = closes.length >= 7 ? closes[closes.length - 7] : null;

              const change1 = pctChange(latestClose, prevClose);
              const change3 = pctChange(latestClose, close3);
              const change6 = pctChange(latestClose, close6);

              const avgRange6 = avg(ranges.slice(-6));
              const avgRange12 = avg(ranges.slice(-12));
              const dt = parseDt(latest.datetime_utc);

              let state = {
                market_state_status: "OK",
                instrument: surface.instrument,
                timeframe: surface.timeframe,
                surface: surface.surface,
                provider_symbol: surface.symbol,
                provider_interval: surface.interval,
                candidate_family: surface.candidate_family,
                lifecycle: surface.lifecycle,
                fetch_status: fetchStatus,
                provider_error_message: errorMessage,
                bar_count: bars.length,
                latest_bar_time_utc: latest.datetime_utc,
                latest_open: round(latest.open),
                latest_high: round(latest.high),
                latest_low: round(latest.low),
                latest_close: round(latestClose),
                latest_range: round(latest.range),
                avg_range_6: round(avgRange6),
                avg_range_12: round(avgRange12),
                range_regime: rangeRegime(latest.range, avgRange12),
                change_1bar_pct: round(change1),
                change_3bar_pct: round(change3),
                change_6bar_pct: round(change6),
                momentum_direction_1bar: direction(change1),
                momentum_direction_3bar: direction(change3),
                momentum_direction_6bar: direction(change6),
                session_bucket_utc: sessionBucketUtc(dt),
                display_authority: "MARKET_STATE_DISPLAY_ONLY_NOT_SIGNAL"
              };

              state = { ...state, ...candidateContext(surface, state) };
              return state;
            }

            const fallbackPayload = {
              program: "SIG_BRAIN_RUNTIME1_DYNAMIC_DISPLAY_ONLY",
              created_at_utc: nowUtc(),
              authority: "DISPLAY_ONLY_NOT_SIGNAL",
              signal_authorized: false,
              broker_execution_authorized: false,
              forward_shadow_authorized: false,
              action_surface_authorized: false,
              cards: []
            };

            let payload = readJson("payloads/sig_brain_state_current.json", null);
            if (!payload) payload = readJson("personal_runtime_v1_latest_product/payloads/sig_brain_state_current.json", fallbackPayload);

            const marketStates = {};
            const results = [];

            for (const surface of surfaces) {
              const fetched = await fetchBars(surface);
              const state = buildState(surface, fetched.bars, fetched.fetch_status, fetched.provider_error_message);
              marketStates[surface.surface] = state;
              results.push({
                surface: surface.surface,
                instrument: surface.instrument,
                timeframe: surface.timeframe,
                fetch_status: fetched.fetch_status,
                bar_count: fetched.bars.length,
                market_state_status: state.market_state_status,
                candidate_context_status: state.candidate_context_status
              });
            }

            if (!Array.isArray(payload.cards)) payload.cards = [];

            for (const surface of surfaces) {
              let card = payload.cards.find(c => (c.surface || `${c.instrument}_${c.timeframe}`) === surface.surface);

              if (!card) {
                card = {
                  instrument: surface.instrument,
                  timeframe: surface.timeframe,
                  surface: surface.surface,
                  candidate_family: surface.candidate_family,
                  brain_state: surface.lifecycle.startsWith("PARKED") ? "PARKED_NOT_ACTIVE" : "RESEARCH_ACTIVE_DISPLAY_ONLY",
                  display_authority: "DISPLAY_ONLY_NOT_TRADE_SIGNAL",
                  signal_authorized: false,
                  broker_execution_authorized: false,
                  forward_shadow_authorized: false,
                  action_surface_authorized: false,
                  blockers: [],
                  caveats: []
                };
                payload.cards.push(card);
              }

              const state = marketStates[surface.surface];

              card.market_state = state;
              card.candidate_context_status = state.candidate_context_status;
              card.candidate_context_reason = state.candidate_context_reason;

              if (!Array.isArray(card.caveats)) card.caveats = [];
              if (!Array.isArray(card.blockers)) card.blockers = [];

              card.caveats.push("DATASTATE1_MARKET_FEATURES_DISPLAY_ONLY_NOT_SIGNAL");

              if (state.market_state_status !== "OK") {
                card.caveats.push("DATASTATE1_MARKET_STATE_UNAVAILABLE");
                card.blockers.push("DATASTATE1_MARKET_STATE_UNAVAILABLE");
              }

              if (String(state.candidate_context_status || "").startsWith("PARKED")) {
                card.caveats.push("DATASTATE1_PARKED_CONTEXT_ONLY");
              }

              card.caveats = [...new Set(card.caveats)];
              card.blockers = [...new Set(card.blockers)];
            }

            payload.program = "SIG_BRAIN_RUNTIME_PLUS_DATASTATE1";
            payload.datastate1_applied_at_utc = nowUtc();
            payload.signal_authorized = false;
            payload.broker_execution_authorized = false;
            payload.forward_shadow_authorized = false;
            payload.action_surface_authorized = false;

            const datastate = {
              program: "PRV1_DATASTATE1_LIVE_MARKET_STATE",
              created_at_utc: nowUtc(),
              authority: "LIVE_MARKET_STATE_DISPLAY_ONLY_NOT_SIGNAL",
              api_key_present: Boolean(apiKey),
              surface_count: surfaces.length,
              market_states: marketStates,
              forbidden_interpretation: [
                "not_signal",
                "not_buy_sell_hold",
                "not_entry_stop_target",
                "not_broker_execution",
                "not_forward_shadow_activation",
                "not_tradability_claim"
              ]
            };

            const proof = {
              status: "PASS",
              program: "PRV1_DATASTATE1_LIVE_MARKET_STATE",
              scope: "market_state_extraction_only",
              created_at_utc: nowUtc(),
              api_key_present: Boolean(apiKey),
              surfaces_checked: surfaces.length,
              fetch_ok_count: results.filter(r => r.fetch_status === "OK").length,
              market_state_ok_count: Object.values(marketStates).filter(s => s.market_state_status === "OK").length,
              cards_updated: payload.cards.length,
              signal_authorized: false,
              broker_execution_authorized: false,
              forward_shadow_authorized: false,
              action_surface_authorized: false
            };

            const report = {
              program: "PRV1_DATASTATE1_LIVE_MARKET_STATE",
              created_at_utc: nowUtc(),
              results,
              proof,
              interpretation: [
                "This extracts market state only.",
             
