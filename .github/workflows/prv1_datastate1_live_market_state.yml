name: PRV1 DATASTATE1 Live Market State

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: prv1-datastate1-pages
  cancel-in-progress: true

jobs:
  build-live-market-state:
    runs-on: ubuntu-latest

    env:
      TD_API_KEY_PRIMARY: ${{ secrets.LFB_TWELVE_DATA_API_KEY }}
      TD_API_KEY_ALT: ${{ secrets.TWELVE_DATA_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build DATASTATE1 JSON
        uses: actions/github-script@v7
        env:
          TD_API_KEY_PRIMARY: ${{ secrets.LFB_TWELVE_DATA_API_KEY }}
          TD_API_KEY_ALT: ${{ secrets.TWELVE_DATA_API_KEY }}
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const apiKey = process.env.TD_API_KEY_PRIMARY || process.env.TD_API_KEY_ALT || "";

            const surfaces = [
              ["EURUSD", "H1", "EURUSD_H1", "EUR/USD", "1h", "london_overlap_directional_persistence", "RESEARCH_ACTIVE"],
              ["USDJPY", "H1", "USDJPY_H1", "USD/JPY", "1h", "trend_session_continuity", "RESEARCH_ACTIVE_WITH_DATA_QUALITY_CAVEAT"],
              ["XAUUSD", "M15", "XAUUSD_M15", "XAU/USD", "15min", "event_session_range_expansion", "PARKED_FOR_PORTFOLIO_BALANCE"],
              ["EURUSD", "M15", "EURUSD_M15", "EUR/USD", "15min", "low_vol_compression_full_domain_display_contract", "PARKED_DISPLAY_CONTRACT_CLOSED"],
              ["USDJPY", "M15", "USDJPY_M15", "USD/JPY", "15min", "asia_range_neutral_full_asia", "PARKED_DIAGNOSTIC_COMPLETE_FOR_NOW"],
              ["XAUUSD", "H1", "XAUUSD_H1", "XAU/USD", "1h", "risk_off_candidate_flow_context", "SUPPORT_CONTEXT_ONLY"]
            ].map(x => ({
              instrument: x[0],
              timeframe: x[1],
              surface: x[2],
              symbol: x[3],
              interval: x[4],
              candidate_family: x[5],
              lifecycle: x[6]
            }));

            function mkdirp(p) {
              fs.mkdirSync(p, { recursive: true });
            }

            function nowUtc() {
              return new Date().toISOString().replace(/\.\d{3}Z$/, "Z");
            }

            function readJson(p, fallback) {
              try {
                if (fs.existsSync(p)) {
                  return JSON.parse(fs.readFileSync(p, "utf8"));
                }
              } catch (e) {}
              return fallback;
            }

            function writeJson(p, data) {
              mkdirp(path.dirname(p));
              fs.writeFileSync(p, JSON.stringify(data, null, 2), "utf8");
            }

            function parseDt(raw) {
              if (!raw) return null;
              let t = String(raw).trim().replace(" ", "T");
              if (!/[zZ]|[+-]\d\d:?\d\d$/.test(t)) {
                t += "Z";
              }
              const d = new Date(t);
              return Number.isNaN(d.getTime()) ? null : d;
            }

            function num(x) {
              const v = Number(x);
              return Number.isFinite(v) ? v : null;
            }

            function avg(xs) {
              const good = xs.filter(Number.isFinite);
              if (!good.length) return null;
              return good.reduce((a, b) => a + b, 0) / good.length;
            }

            function round(x, d = 6) {
              return Number.isFinite(x) ? Number(x.toFixed(d)) : null;
            }

            function pct(a, b) {
              if (!Number.isFinite(a) || !Number.isFinite(b) || b === 0) return null;
              return ((a - b) / b) * 100;
            }

            function dir(p) {
              if (!Number.isFinite(p)) return "UNKNOWN";
              if (p > 0.03) return "UP";
              if (p < -0.03) return "DOWN";
              return "FLAT";
            }

            function sessionBucket(dt) {
              if (!dt) return "UNKNOWN_SESSION";
              const h = dt.getUTCHours();
              if (h < 7) return "ASIA";
              if (h < 12) return "LONDON";
              if (h < 16) return "LONDON_NY_OVERLAP";
              if (h < 21) return "NEW_YORK";
              return "ROLLOVER_OR_THIN_LIQUIDITY";
            }

            function rangeRegime(latestRange, avgRange12) {
              if (!Number.isFinite(latestRange) || !Number.isFinite(avgRange12) || avgRange12 <= 0) {
                return "UNKNOWN_RANGE_REGIME";
              }
              const ratio = latestRange / avgRange12;
              if (ratio < 0.65) return "COMPRESSED";
              if (ratio > 1.5) return "EXPANDED";
              return "NORMAL";
            }

            function contextStatus(surface, state) {
              if (surface.lifecycle.startsWith("PARKED")) {
                return ["PARKED_CONTEXT_ONLY", "research_path_is_parked_or_complete_for_now"];
              }

              if (surface.lifecycle === "SUPPORT_CONTEXT_ONLY") {
                return ["SUPPORT_CONTEXT_ONLY", "context_layer_cannot_create_signal"];
              }

              if (surface.surface === "EURUSD_H1") {
                const goodSession = state.session_bucket_utc === "LONDON" || state.session_bucket_utc === "LONDON_NY_OVERLAP";
                const directional = state.momentum_direction_3bar === "UP" || state.momentum_direction_3bar === "DOWN";

                if (goodSession && directional) {
                  return ["CONTEXT_PRESENT_DISPLAY_ONLY", "eurusd_h1_active_session_and_directional_recent_momentum"];
                }

                if (!goodSession) {
                  return ["SESSION_OUT_OF_FOCUS_DISPLAY_ONLY", "eurusd_h1_family_prefers_london_or_overlap_context"];
                }

                return ["CONTEXT_WEAK_OR_FLAT_DISPLAY_ONLY", "eurusd_h1_recent_momentum_not_directional_enough"];
              }

              if (surface.surface === "USDJPY_H1") {
                const directional = state.momentum_direction_3bar === "UP" || state.momentum_direction_3bar === "DOWN";

                if (directional && state.range_regime !== "EXPANDED") {
                  return ["CONTEXT_PRESENT_WITH_DATA_QUALITY_CAVEAT", "usdjpy_h1_directional_recent_momentum_but_data_quality_caveat_remains"];
                }

                return ["CONTEXT_WEAK_OR_CAVEATED_DISPLAY_ONLY", "usdjpy_h1_context_not_strong_enough_or_range_expanded"];
              }

              return ["CONTEXT_RECORDED_DISPLAY_ONLY", "generic_market_state_recorded_without_signal_authority"];
            }

            async function fetchBars(surface) {
              if (!apiKey) {
                return {
                  fetch_status: "BLOCKED_MISSING_TWELVE_DATA_API_KEY",
                  bars: [],
                  error: "missing secret"
                };
              }

              const url = new URL("https://api.twelvedata.com/time_series");
              url.searchParams.set("symbol", surface.symbol);
              url.searchParams.set("interval", surface.interval);
              url.searchParams.set("outputsize", "48");
              url.searchParams.set("timezone", "UTC");
              url.searchParams.set("apikey", apiKey);

              try {
                const res = await fetch(url, {
                  headers: { "User-Agent": "PRV1-SIG-Brain-ReadOnly/1.0" }
                });

                const data = await res.json();

                if (data && data.status === "error") {
                  return {
                    fetch_status: "PROVIDER_ERROR",
                    bars: [],
                    error: data.message || data.code || "provider_error"
                  };
                }

                const values = Array.isArray(data.values) ? data.values : [];

                if (!values.length) {
                  return {
                    fetch_status: "NO_VALUES_RETURNED",
                    bars: [],
                    error: null
                  };
                }

                const bars = values.map(row => {
                  const dt = parseDt(row.datetime || row.timestamp);
                  const open = num(row.open);
                  const high = num(row.high);
                  const low = num(row.low);
                  const close = num(row.close);

                  if (!dt || open === null || high === null || low === null || close === null) {
                    return null;
                  }

                  return {
                    datetime_utc: dt.toISOString().replace(/\.\d{3}Z$/, "Z"),
                    open,
                    high,
                    low,
                    close,
                    range: high - low
                  };
                }).filter(Boolean).sort((a, b) => {
                  return new Date(a.datetime_utc) - new Date(b.datetime_utc);
                });

                return {
                  fetch_status: "OK",
                  bars,
                  error: null
                };
              } catch (e) {
                return {
                  fetch_status: "FETCH_EXCEPTION",
                  bars: [],
                  error: String(e).slice(0, 300)
                };
              }
            }

            function buildState(surface, fetched) {
              const bars = fetched.bars || [];

              if (!bars.length) {
                return {
                  market_state_status: "UNAVAILABLE",
                  instrument: surface.instrument,
                  timeframe: surface.timeframe,
                  surface: surface.surface,
                  candidate_family: surface.candidate_family,
                  lifecycle: surface.lifecycle,
                  fetch_status: fetched.fetch_status,
                  provider_error_message: fetched.error,
                  bar_count: 0,
                  candidate_context_status: "NOT_CHECKED",
                  candidate_context_reason: "no_bars_available",
                  display_authority: "MARKET_STATE_DISPLAY_ONLY_NOT_SIGNAL"
                };
              }

              const latest = bars[bars.length - 1];
              const closes = bars.map(b => b.close);
              const ranges = bars.map(b => b.range);

              const c = latest.close;
              const p1 = closes.length >= 2 ? closes[closes.length - 2] : null;
              const p3 = closes.length >= 4 ? closes[closes.length - 4] : null;
              const p6 = closes.length >= 7 ? closes[closes.length - 7] : null;

              const ch1 = pct(c, p1);
              const ch3 = pct(c, p3);
              const ch6 = pct(c, p6);

              const ar6 = avg(ranges.slice(-6));
              const ar12 = avg(ranges.slice(-12));
              const latestDt = parseDt(latest.datetime_utc);

              const state = {
                market_state_status: "OK",
                instrument: surface.instrument,
                timeframe: surface.timeframe,
                surface: surface.surface,
                provider_symbol: surface.symbol,
                provider_interval: surface.interval,
                candidate_family: surface.candidate_family,
                lifecycle: surface.lifecycle,
                fetch_status: fetched.fetch_status,
                provider_error_message: fetched.error,
                bar_count: bars.length,
                latest_bar_time_utc: latest.datetime_utc,
                latest_open: round(latest.open),
                latest_high: round(latest.high),
                latest_low: round(latest.low),
                latest_close: round(c),
                latest_range: round(latest.range),
                avg_range_6: round(ar6),
                avg_range_12: round(ar12),
                range_regime: rangeRegime(latest.range, ar12),
                change_1bar_pct: round(ch1),
                change_3bar_pct: round(ch3),
                change_6bar_pct: round(ch6),
                momentum_direction_1bar: dir(ch1),
                momentum_direction_3bar: dir(ch3),
                momentum_direction_6bar: dir(ch6),
                session_bucket_utc: sessionBucket(latestDt),
                display_authority: "MARKET_STATE_DISPLAY_ONLY_NOT_SIGNAL"
              };

              const ctx = contextStatus(surface, state);
              state.candidate_context_status = ctx[0];
              state.candidate_context_reason = ctx[1];

              return state;
            }

            const fallbackPayload = {
              program: "SIG_BRAIN_RUNTIME1_DYNAMIC_DISPLAY_ONLY",
              created_at_utc: nowUtc(),
              authority: "DISPLAY_ONLY_NOT_SIGNAL",
              signal_authorized: false,
              broker_execution_authorized: false,
              forward_shadow_authorized: false,
              action_surface_authorized: false,
              cards: []
            };

            let payload = readJson("payloads/sig_brain_state_current.json", null);
            if (!payload) {
              payload = readJson("personal_runtime_v1_latest_product/payloads/sig_brain_state_current.json", fallbackPayload);
            }
            if (!Array.isArray(payload.cards)) {
              payload.cards = [];
            }

            const marketStates = {};
            const results = [];

            for (const surface of surfaces) {
              const fetched = await fetchBars(surface);
              const state = buildState(surface, fetched);

              marketStates[surface.surface] = state;

              results.push({
                surface: surface.surface,
                fetch_status: fetched.fetch_status,
                bar_count: (fetched.bars || []).length,
                market_state_status: state.market_state_status,
                candidate_context_status: state.candidate_context_status
              });

              let card = payload.cards.find(c => {
                const key = c.surface || `${c.instrument}_${c.timeframe}`;
                return key === surface.surface;
              });

              if (!card) {
                card = {
                  instrument: surface.instrument,
                  timeframe: surface.timeframe,
                  surface: surface.surface,
                  candidate_family: surface.candidate_family,
                  brain_state: surface.lifecycle.startsWith("PARKED") ? "PARKED_NOT_ACTIVE" : "RESEARCH_ACTIVE_DISPLAY_ONLY",
                  display_authority: "DISPLAY_ONLY_NOT_TRADE_SIGNAL",
                  signal_authorized: false,
                  broker_execution_authorized: false,
                  forward_shadow_authorized: false,
                  action_surface_authorized: false,
                  blockers: [],
                  caveats: []
                };
                payload.cards.push(card);
              }

              card.market_state = state;
              card.candidate_context_status = state.candidate_context_status;
              card.candidate_context_reason = state.candidate_context_reason;

              if (!Array.isArray(card.caveats)) card.caveats = [];
              if (!Array.isArray(card.blockers)) card.blockers = [];

              card.caveats.push("DATASTATE1_MARKET_FEATURES_DISPLAY_ONLY_NOT_SIGNAL");

              if (state.market_state_status !== "OK") {
                card.caveats.push("DATASTATE1_MARKET_STATE_UNAVAILABLE");
                card.blockers.push("DATASTATE1_MARKET_STATE_UNAVAILABLE");
              }

              card.caveats = Array.from(new Set(card.caveats));
              card.blockers = Array.from(new Set(card.blockers));
            }

            payload.program = "SIG_BRAIN_RUNTIME_PLUS_DATASTATE1";
            payload.datastate1_applied_at_utc = nowUtc();
            payload.signal_authorized = false;
            payload.broker_execution_authorized = false;
            payload.forward_shadow_authorized = false;
            payload.action_surface_authorized = false;

            const datastate = {
              program: "PRV1_DATASTATE1_LIVE_MARKET_STATE",
              created_at_utc: nowUtc(),
              authority: "LIVE_MARKET_STATE_DISPLAY_ONLY_NOT_SIGNAL",
              api_key_present: Boolean(apiKey),
              surface_count: surfaces.length,
              market_states: marketStates,
              forbidden_interpretation: [
                "not_signal",
                "not_buy_sell_hold",
                "not_entry_stop_target",
                "not_broker_execution",
                "not_forward_shadow_activation",
                "not_tradability_claim"
              ]
            };

            const proof = {
              status: "PASS",
              program: "PRV1_DATASTATE1_LIVE_MARKET_STATE",
              scope: "market_state_extraction_only",
              created_at_utc: nowUtc(),
              api_key_present: Boolean(apiKey),
              surfaces_checked: surfaces.length,
              fetch_ok_count: results.filter(r => r.fetch_status === "OK").length,
              market_state_ok_count: Object.values(marketStates).filter(s => s.market_state_status === "OK").length,
              cards_updated: payload.cards.length,
              signal_authorized: false,
              broker_execution_authorized: false,
              forward_shadow_authorized: false,
              action_surface_authorized: false
            };

            const report = {
              program: "PRV1_DATASTATE1_LIVE_MARKET_STATE",
              created_at_utc: nowUtc(),
              results,
              proof,
              interpretation: [
                "This extracts market state only.",
                "Market state is not a trade setup by itself.",
                "Candidate context status is display-only and not signal authority."
              ]
            };

            writeJson("payloads/sig_brain_state_current.json", payload);
            writeJson("personal_runtime_v1_latest_product/payloads/sig_brain_state_current.json", payload);

            writeJson("datastate/prv1_datastate1_current.json", datastate);
            writeJson("personal_runtime_v1_latest_product/datastate/prv1_datastate1_current.json", datastate);

            writeJson("reports/prv1_datastate1_report.json", report);
            writeJson("personal_runtime_v1_latest_product/reports/prv1_datastate1_report.json", report);

            writeJson("proofs/prv1_datastate1_proof.json", proof);
            writeJson("personal_runtime_v1_latest_product/proofs/prv1_datastate1_proof.json", proof);

      - name: Build data-state inspection page
        shell: bash
        run: |
          mkdir -p panel/sigbrain-data

          cat > panel/sigbrain-data/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>PRV1 + SIG Brain Data State</title>
            <style>
              body { margin:0; font-family:Arial, Helvetica, sans-serif; background:#0f172a; color:#e5e7eb; }
              .wrap { max-width:820px; margin:0 auto; padding:16px; }
              .hero,.card { border:1px solid #334155; border-radius:22px; background:#111827; padding:18px; margin:12px 0; }
              .card { background:#020617; }
              .badge { display:inline-block; padding:6px 10px; border-radius:999px; background:#1e293b; color:#93c5fd; font-size:12px; margin-bottom:12px; }
              h1 { font-size:34px; line-height:1.08; margin:10px 0 10px; }
              h2 { font-size:26px; margin:0 0 10px; }
              .muted { color:#94a3b8; line-height:1.45; }
              .grid { display:grid; grid-template-columns:1fr; gap:10px; }
              .kv { background:#0f172a; border:1px solid #1e293b; border-radius:14px; padding:12px; }
              .label { color:#94a3b8; font-size:12px; text-transform:uppercase; letter-spacing:.08em; margin-bottom:4px; }
              .value { overflow-wrap:anywhere; font-weight:700; }
      
