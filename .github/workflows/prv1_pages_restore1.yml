name: PRV1 PAGES RESTORE1 Restore Working SIG Brain Pages

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: prv1-pages-restore1
  cancel-in-progress: true

jobs:
  restore-pages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Mirror existing working SIG Brain files to root Pages paths
        shell: bash
        run: |
          mkdir -p panel payloads journal proofs reports

          if [ -d personal_runtime_v1_latest_product/panel/sigbrain ]; then
            rm -rf panel/sigbrain
            cp -R personal_runtime_v1_latest_product/panel/sigbrain panel/sigbrain
          fi

          if [ -d personal_runtime_v1_latest_product/panel/sigbrain-journal ]; then
            rm -rf panel/sigbrain-journal
            cp -R personal_runtime_v1_latest_product/panel/sigbrain-journal panel/sigbrain-journal
          fi

          if [ -d personal_runtime_v1_latest_product/payloads ]; then
            cp -R personal_runtime_v1_latest_product/payloads/* payloads/ || true
          fi

          if [ -d personal_runtime_v1_latest_product/journal ]; then
            cp -R personal_runtime_v1_latest_product/journal/* journal/ || true
          fi

          if [ -d personal_runtime_v1_latest_product/proofs ]; then
            cp -R personal_runtime_v1_latest_product/proofs/* proofs/ || true
          fi

          if [ -d personal_runtime_v1_latest_product/reports ]; then
            cp -R personal_runtime_v1_latest_product/reports/* reports/ || true
          fi

          cat > proofs/prv1_pages_restore1_proof.json <<'JSON'
          {
            "status": "PASS",
            "program": "PRV1_PAGES_RESTORE1",
            "scope": "restore_existing_sigbrain_pages_paths_only",
            "signal_authorized": false,
            "broker_execution_authorized": false,
            "forward_shadow_authorized": false,
            "action_surface_authorized": false
          }
          JSON

          test -f panel/sigbrain/index.html
          test -f payloads/sig_brain_state_current.json

      - name: Commit restored root Pages files
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add panel/sigbrain panel/sigbrain-journal payloads journal proofs reports
          git commit -m "Restore SIG Brain Pages root paths" || echo "No changes to commit"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
