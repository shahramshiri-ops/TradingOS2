name: PRV1 STATUS1 Runtime Status Card

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: prv1-status1-pages
  cancel-in-progress: true

jobs:
  build-runtime-status:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build runtime status JSON and mobile page
        shell: bash
        run: |
          mkdir -p status panel/sigbrain-status proofs

          python - <<'PY'
          import json
          from pathlib import Path
          from datetime import datetime, timezone

          def now_utc():
              return datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          def read_json(path, default=None):
              if default is None:
                  default = {}
              try:
                  p = Path(path)
                  if p.exists():
                      return json.loads(p.read_text(encoding="utf-8"))
              except Exception:
                  return default
              return default

          payload = read_json("payloads/sig_brain_state_current.json", {})
          journal = read_json("journal/sig_brain_state_journal_summary.json", {})

          live_feed_proof = read_json("proofs/prv1_live_feed1_proof.json", {})
          journal_fix_proof = read_json("proofs/prv1_journal_fix1_proof.json", {})
          pages_restore_proof = read_json("proofs/prv1_pages_restore1_proof.json", {})
          nav_proof = read_json("proofs/prv1_panel_nav1_proof.json", {})

          cards = payload.get("cards", [])

          state_counts = {}
          freshness_counts = {}
          latest_freshness_by_surface = {}

          for c in cards:
              state = c.get("brain_state", "UNKNOWN")
              freshness = c.get("freshness_status", "UNKNOWN")
              surface = c.get("surface") or f"{c.get('instrument')}_{c.get('timeframe')}"

              state_counts[state] = state_counts.get(state, 0) + 1
              freshness_counts[freshness] = freshness_counts.get(freshness, 0) + 1
              latest_freshness_by_surface[surface] = {
                  "instrument": c.get("instrument"),
                  "timeframe": c.get("timeframe"),
                  "brain_state": state,
                  "freshness_status": freshness,
                  "latest_provider_datetime_utc": c.get("latest_provider_datetime_utc"),
                  "surface_evidence_available": c.get("surface_evidence_available"),
                  "blocker_count": len(c.get("blockers", [])),
                  "caveat_count": len(c.get("caveats", []))
              }

          required_proofs = {
              "live_feed": live_feed_proof.get("status"),
              "journal_fix": journal_fix_proof.get("status"),
              "pages_restore": pages_restore_proof.get("status"),
              "nav": nav_proof.get("status")
          }

          missing = []
          warnings = []

          if not payload:
              missing.append("payloads/sig_brain_state_current.json")

          if not journal:
              missing.append("journal/sig_brain_state_journal_summary.json")

          for name, status in required_proofs.items():
              if status != "PASS":
                  warnings.append(f"{name}_proof_not_pass")

          if not cards:
              warnings.append("no_cards_in_payload")

          if "FRESH" not in freshness_counts:
              warnings.append("no_fresh_surface_currently_detected")

          if payload.get("signal_authorized") is not False:
              warnings.append("payload_signal_authorized_not_false")

          if payload.get("broker_execution_authorized") is not False:
              warnings.append("payload_broker_execution_authorized_not_false")

          if payload.get("forward_shadow_authorized") is not False:
              warnings.append("payload_forward_shadow_authorized_not_false")

          if missing:
              overall = "BLOCKED"
          elif warnings:
              overall = "WARN"
          else:
              overall = "OK"

          status = {
              "program": "PRV1_STATUS1_RUNTIME_STATUS_CARD",
              "updated_at_utc": now_utc(),
              "overall_status": overall,
              "missing_files": missing,
              "warnings": warnings,
              "payload": {
                  "program": payload.get("program"),
                  "created_at_utc": payload.get("created_at_utc"),
                  "card_count": len(cards),
                  "evidence_file_count": len(payload.get("prv1_evidence_files", [])),
                  "state_counts": state_counts,
                  "freshness_counts": freshness_counts,
                  "latest_freshness_by_surface": latest_freshness_by_surface
              },
              "journal": {
                  "program": journal.get("program"),
                  "updated_at_utc": journal.get("updated_at_utc"),
                  "retained_snapshot_count": journal.get("retained_snapshot_count"),
                  "aggregate_state_counts": journal.get("aggregate_state_counts", {})
              },
              "proofs": required_proofs,
              "authority": {
                  "display_only": True,
                  "signal_authorized": False,
                  "broker_execution_authorized": False,
                  "forward_shadow_authorized": False,
                  "action_surface_authorized": False
              },
              "official_refresh_route": "PRV1 AUTO REFRESH1 Master",
              "official_pages": {
                  "hub": "panel/sigbrain-home/",
                  "main_panel": "panel/sigbrain/",
                  "journal": "panel/sigbrain-journal/",
                  "status": "panel/sigbrain-status/"
              }
          }

          proof = {
              "status": "PASS",
              "program": "PRV1_STATUS1_RUNTIME_STATUS_CARD",
              "scope": "runtime_status_display_only",
              "overall_status": overall,
              "updated_at_utc": status["updated_at_utc"],
              "signal_authorized": False,
              "broker_execution_authorized": False,
              "forward_shadow_authorized": False,
              "action_surface_authorized": False
          }

          Path("status/prv1_runtime_status_current.json").write_text(
              json.dumps(status, indent=2, ensure_ascii=False),
              encoding="utf-8"
          )

          Path("proofs/prv1_status1_proof.json").write_text(
              json.dumps(proof, indent=2, ensure_ascii=False),
              encoding="utf-8"
          )
          PY

          cat > panel/sigbrain-status/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>PRV1 + SIG Brain Status</title>
            <style>
              body {
                margin: 0;
                font-family: Arial, Helvetica, sans-serif;
                background: #0f172a;
                color: #e5e7eb;
              }

              .wrap {
                max-width: 820px;
                margin: 0 auto;
                padding: 16px;
              }

              .hero,
              .card {
                border: 1px solid #334155;
                border-radius: 22px;
                background: #111827;
                padding: 18px;
                margin: 12px 0;
              }

              .card {
                background: #020617;
              }

              .badge {
                display: inline-block;
                padding: 6px 10px;
                border-radius: 999px;
                background: #1e293b;
                color: #93c5fd;
                font-size: 12px;
                margin-bottom: 12px;
              }

              h1 {
                font-size: 34px;
                line-height: 1.08;
                margin: 10px 0 10px;
              }

              h2 {
                font-size: 24px;
                margin: 0 0 10px;
              }

              .muted {
                color: #94a3b8;
                line-height: 1.45;
              }

              .grid {
                display: grid;
                grid-template-columns: 1fr;
                gap: 10px;
              }

              .kv {
                background: #0f172a;
                border: 1px solid #1e293b;
                border-radius: 14px;
                padding: 12px;
              }

              .label {
                color: #94a3b8;
                font-size: 12px;
                text-transform: uppercase;
                letter-spacing: .08em;
                margin-bottom: 4px;
              }

              .value {
                overflow-wrap: anywhere;
                font-weight: 700;
              }

              .ok {
                color: #86efac;
              }

              .warn {
                color: #facc15;
              }

              .bad {
                color: #fca5a5;
              }

              a.button {
                display: block;
                text-decoration: none;
                color: #e5e7eb;
                background: #1e293b;
                border: 1px solid #334155;
                border-radius: 16px;
                padding: 14px;
                margin-top: 10px;
                font-weight: 700;
              }

              .small {
                font-size: 12px;
                color: #94a3b8;
                overflow-wrap: anywhere;
              }

              @media (min-width: 700px) {
                .grid {
                  grid-template-columns: 1fr 1fr;
                }
              }
            </style>
          </head>

          <body>
            <div class="wrap">
              <section class="hero">
                <span class="badge">RUNTIME STATUS / DISPLAY ONLY</span>
                <h1>PRV1 + SIG Brain Status</h1>
                <p class="muted">
                  وضعیت سلامت runtime، payload، freshness، journal و proofها.
                  این صفحه سیگنال معاملاتی نیست.
                </p>
                <p class="muted" id="meta">Loading status...</p>
              </section>

              <main id="content"></main>

              <section class="card">
                <h2>Links</h2>
                <a class="button" href="../sigbrain/?v=status">Open Main Panel</a>
                <a class="button" href="../sigbrain-journal/?v=status">Open Journal</a>
                <a class="button" href="../sigbrain-home/?v=status">Open Hub</a>
                <a class="button" href="../../status/prv1_runtime_status_current.json?v=status">Open Status JSON</a>
              </section>

              <section class="card">
                <h2>Boundary</h2>
                <p class="bad">
                  Not signal. No buy/sell/hold. No entry/stop/target.
                  No broker execution. No forward shadow activation.
                </p>
              </section>
            </div>

            <script>
              function cls(status) {
                if (status === "OK" || status === "PASS" || status === "FRESH") return "ok";
                if (status === "WARN") return "warn";
                return "bad";
              }

              function kv(label, value, cssClass = "") {
                return `
                  <div class="kv">
                    <div class="label">${label}</div>
                    <div class="value ${cssClass}">${value ?? "n/a"}</div>
                  </div>
                `;
              }

              async function main() {
                const res = await fetch('../../status/prv1_runtime_status_current.json?ts=' + Date.now());
                const data = await res.json();

                document.getElementById('meta').textContent =
                  'Updated: ' + data.updated_at_utc +
                  ' | Official refresh: ' + data.official_refresh_route;

                const payload = data.payload || {};
                const journal = data.journal || {};
                const proofs = data.proofs || {};
                const freshness = payload.freshness_counts || {};
                const states = payload.state_counts || {};

                const content = document.getElementById('content');

                content.innerHTML = `
                  <section class="card">
                    <h2>Overall</h2>
                    <div class="grid">
                      ${kv("Overall status", data.overall_status, cls(data.overall_status))}
                      ${kv("Card count", payload.card_count)}
                      ${kv("Evidence files", payload.evidence_file_count)}
                      ${kv("Journal snapshots", journal.retained_snapshot_count)}
                    </div>
                  </section>

                  <section class="card">
                    <h2>Freshness</h2>
                    <div class="grid">
                      ${Object.entries(freshness).map(([k,v]) => kv(k, v, cls(k))).join("") || kv("Freshness", "none")}
                    </div>
                  </section>

                  <section class="card">
                    <h2>Brain states</h2>
                    <div class="grid">
                      ${Object.entries(states).map(([k,v]) => kv(k, v)).join("") || kv("States", "none")}
                    </div>
                  </section>

                  <section class="card">
                    <h2>Proofs</h2>
                    <div class="grid">
                      ${Object.entries(proofs).map(([k,v]) => kv(k, v, cls(v))).join("")}
                    </div>
                  </section>

                  <section class="card">
                    <h2>Warnings</h2>
                    <p class="small">${(data.warnings || []).join(", ") || "none"}</p>
                    <p class="small">${(data.missing_files || []).join(", ") || ""}</p>
                  </section>
                `;
              }

              main().catch(err => {
                document.getElementById('meta').textContent = 'Failed to load status.';
                document.getElementById('content').innerHTML =
                  '<section class="card"><p class="bad">Status JSON could not be loaded.</p></section>';
              });
            </script>
          </body>
          </html>
          HTML

      - name: Commit status card
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add status/prv1_runtime_status_current.json
          git add panel/sigbrain-status/index.html
          git add proofs/prv1_status1_proof.json

          git commit -m "Add PRV1 SIG Brain runtime status card" || echo "No changes to commit"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
