name: SIG Brain5 Context Builder + Brain4 Panel

on:
  workflow_dispatch:
  push:
    paths:
      - 'inputs/sig_brain5_raw_bars_latest.json'
      - 'scripts/build_sig_brain5_live_context.py'
      - 'scripts/build_sig_brain4_runtime_payload.py'
      - 'data/sig_brain/**'
      - 'panel/brain4/**'

concurrency:
  group: sig-brain5-context-builder-brain4-panel
  cancel-in-progress: true

jobs:
  build-brain-context:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4
      - name: Build derived Brain5 live context
        run: |
          python scripts/build_sig_brain5_live_context.py
          python scripts/validate_sig_brain5_context_builder.py
          python scripts/run_sig_shadow_01b_integrated.py
          python scripts/run_sig_shadow_ready_01.py
      # SHADOW-DIAG-01 — near-miss/blocker/eligibility diagnostics (NOT_SIGNAL)
      - name: Build SHADOW-DIAG-01 diagnostics
        run: python scripts/run_sig_shadow_diag_01.py

      # SHADOW-OPS-01 — diagnostics, eligibility, rollups, health (NOT_SIGNAL)
      - name: Build SHADOW-OPS-01 operational diagnostics
        run: python scripts/run_sig_shadow_ops_01.py

      # REASON-UPSTREAM-01 / DIAG-02 — enrich near-miss reason codes (NOT_SIGNAL)
      - name: Build REASON-UPSTREAM-01 near-miss reason source
        run: python scripts/run_sig_shadow_reason_upstream_01.py

      # COUNT-NORMALIZE-01 — clarify shadow count semantics (NOT_SIGNAL)
      - name: Build COUNT-NORMALIZE-01 shadow count semantics
        run: python scripts/run_sig_shadow_count_normalize_01.py

      # LIVE-SHADOW-FOUNDATION-01 — append-only context/setup/trigger logs (NOT_SIGNAL)
      - name: Build LIVE-SHADOW-FOUNDATION-01 append-only logs
        run: python scripts/run_sig_live_shadow_foundation_01.py

      # SHADOW-OUTCOME-01 — path observation after shadow objects (NOT_SIGNAL, NOT_PNL)
      - name: Build SHADOW-OUTCOME-01 path observations
        run: python scripts/run_sig_shadow_outcome_01.py

      # SHADOW-OUTCOME-01A — price-bar anchor fallback for outcome observations (NOT_SIGNAL, NOT_PNL)
      - name: Build SHADOW-OUTCOME-01A price anchors
        run: python scripts/run_shadow_outcome_01a_price_anchor.py

      # SHADOW-OUTCOME-01B — H1 price source bridge for outcome observations (NOT_SIGNAL, NOT_PNL)
      - name: Build SHADOW-OUTCOME-01B H1 price bridge
        run: python scripts/run_shadow_outcome_01b_price_source_bridge.py

      # SHADOW-OUTCOME-01C — live-recent M5 price bridge guard (NOT_SIGNAL, NOT_PNL)
      - name: Build SHADOW-OUTCOME-01C live-recent price bridge
        run: python scripts/run_shadow_outcome_01c_live_recent_price_bridge.py

      # SHADOW-OUTCOME-01D — freshness, closed-H1 and completion guard (NOT_SIGNAL, NOT_PNL)
      - name: Build SHADOW-OUTCOME-01D outcome quality guard
        run: python scripts/run_shadow_outcome_01d.py

      - name: Commit derived display-only context and payload
        id: commit_generated
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add inputs/sig_brain4_live_context_latest.json runtime/sig_brain/sig_brain5_derived_context_latest.json runtime/sig_brain/sig_brain4_runtime_payload_current.json panel/brain4/sig_brain4_runtime_payload_current.json proofs/sig_brain5_context_validation_result.json proofs/sig_brain4_validation_result.json runtime/sig_signal_candidates runtime/sig_shadow
          if git diff --cached --quiet; then
            echo "No generated changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "Update SIG Brain5 derived context and Brain4 payload"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - name: Trigger static Pages deploy after generated commit
        if: steps.commit_generated.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run deploy_tradingos_pages.yml --ref "${GITHUB_REF_NAME}"
