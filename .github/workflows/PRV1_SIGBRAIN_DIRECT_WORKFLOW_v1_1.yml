name: PRV1 SIG Brain Direct Panel — Display Only

on:
  workflow_dispatch:
    inputs:
      trigger_source:
        description: "Source of manual trigger"
        required: false
        default: "mobile_manual"
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

env:
  LFB_TWELVE_DATA_API_KEY: ${{ secrets.LFB_TWELVE_DATA_API_KEY }}
  MOBILE_REFRESH_WORKER_URL: ${{ vars.MOBILE_REFRESH_WORKER_URL }}
  GITHUB_PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

jobs:
  build-prv1-sigbrain-display-only-panel:
    runs-on: windows-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run existing PRV1 live read-only refresh if present
        shell: pwsh
        run: |
          if (Test-Path "RUN_DAILY.bat") {
            cmd /c RUN_DAILY.bat
          } else {
            Write-Host "RUN_DAILY.bat not found; continuing with display-only fallback payload."
          }

      - name: Create SIG Brain display-only adapter and panel builder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path scripts, panel, public, proofs | Out-Null
          @'
import json, os
 from pathlib import Path
 from datetime import datetime, timezone

OBJECTS = [
  {"instrument":"EURUSD","timeframe":"H1","candidate_family":"london_overlap_directional_persistence","brain_state":"RESEARCH_ACTIVE_DISPLAY_ONLY","reason":"H1 research path active after portfolio rebalance. Display-only; not signal."},
  {"instrument":"USDJPY","timeframe":"H1","candidate_family":"trend_session_continuity","brain_state":"DATA_QUALITY_CAVEATED_RESEARCH_ACTIVE","reason":"H1 research path active with carried data-quality caveat. Display-only; not signal."},
  {"instrument":"XAUUSD","timeframe":"M15","candidate_family":"event_session_range_expansion","brain_state":"PARKED_NOT_ACTIVE","reason":"XAU M15 parked after baseline-patched review to avoid overfocus; event/cost gates remain."},
  {"instrument":"EURUSD","timeframe":"M15","candidate_family":"low_vol_compression_full_domain_display_contract","brain_state":"PARKED_NOT_ACTIVE","reason":"Display contract closed; not active for signal brain."},
  {"instrument":"USDJPY","timeframe":"M15","candidate_family":"asia_range_neutral_full_asia","brain_state":"PARKED_NOT_ACTIVE","reason":"Diagnostic complete for now; not a live signal object."},
  {"instrument":"XAUUSD","timeframe":"H1","candidate_family":"risk_off_candidate_flow_context","brain_state":"PARKED_NOT_ACTIVE","reason":"Context layer only; not signal."}
]

def now():
    return datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace('+00:00','Z')

def read_json(path, default=None):
    default = {} if default is None else default
    try:
        p=Path(path)
        if p.exists():
            return json.loads(p.read_text(encoding='utf-8'))
    except Exception:
        return default
    return default

def surface_map():
    candidates = [
      'reports/staged_cache_update_report.json',
      'reports/staged_provider_fetch_report.json',
      'reports/candidate_detection_report.json',
      'outputs/latest_live_context.json',
      'panel/source_pack_current.json'
    ]
    present=[]
    for c in candidates:
        if Path(c).exists(): present.append(c)
    return present

def main():
    present = surface_map()
    cards=[]
    for o in OBJECTS:
        caveats=[]
        blockers=[]
        if not present:
            caveats.append('PRV1_RUNTIME_REPORTS_NOT_FOUND_OR_NOT_PARSED')
        if o['brain_state']=='PARKED_NOT_ACTIVE':
            blockers.append('PARKED_BY_SIG_PORTFOLIO_DECISION')
        if o['instrument']=='USDJPY' and o['timeframe']=='H1':
            caveats.append('DATA_QUALITY_CAVEAT_CARRIED_FORWARD')
        if o['instrument']=='XAUUSD' and o['timeframe']=='M15':
            caveats += ['EVENT2_NOT_COMPLETE','COST2B_NOT_COMPLETE','XAU_OVERFOCUS_GUARD']
        cards.append({
            **o,
            'display_authority':'DISPLAY_ONLY_NOT_TRADE_SIGNAL',
            'signal_authorized': False,
            'forward_shadow_authorized': False,
            'broker_execution_authorized': False,
            'action_surface_authorized': False,
            'blocking_factors': blockers,
            'caveats': caveats,
            'runtime_surface': {'prv1_runtime_files_detected': present}
        })
    payload={
      'program':'PRV1-SIGBRAIN-DIRECT1',
      'artifact':'sig_brain_state_current',
      'created_at_utc':now(),
      'source':'github_actions_direct_mobile_workflow_prv1_preserved_if_available',
      'boundary':{
        'display_only_research_state': True,
        'not_signal': True,
        'no_buy_sell_hold': True,
        'no_entry_stop_target': True,
        'no_forward_shadow_activation': True,
        'no_broker_execution': True,
        'no_tradability_claim': True
      },
      'summary':{
        'cards_total':len(cards),
        'research_active_count':sum(1 for c in cards if c['brain_state']!='PARKED_NOT_ACTIVE'),
        'parked_count':sum(1 for c in cards if c['brain_state']=='PARKED_NOT_ACTIVE'),
        'signal_authorized': False,
        'forward_shadow_authorized': False,
        'broker_execution_authorized': False,
        'action_surface_authorized': False,
        'prv1_runtime_files_detected': present
      },
      'brain_cards':cards
    }
    Path('panel').mkdir(exist_ok=True)
    Path('panel/sig_brain_state_current.json').write_text(json.dumps(payload,ensure_ascii=False,indent=2),encoding='utf-8')
    print(json.dumps({'status':'PASS','cards':len(cards),'signal_authorized':False},ensure_ascii=False))
if __name__=='__main__': main()
'@ | Set-Content -Path "scripts/adapt_prv1_live_to_sig_brain.py" -Encoding UTF8

          @'
import json, html, os
from pathlib import Path
from datetime import datetime, timezone

def h(x): return html.escape('' if x is None else str(x))
def read_json(path): return json.loads(Path(path).read_text(encoding='utf-8'))
def state_fa(s):
    return {
      'RESEARCH_ACTIVE_DISPLAY_ONLY':'فعال پژوهشی / فقط نمایش',
      'DATA_QUALITY_CAVEATED_RESEARCH_ACTIVE':'فعال پژوهشی با caveat داده',
      'PARKED_NOT_ACTIVE':'پارک‌شده / غیرفعال'
    }.get(s,s)
def cls(s):
    if s=='RESEARCH_ACTIVE_DISPLAY_ONLY': return 'active'
    if 'CAVEATED' in s: return 'warn'
    if s=='PARKED_NOT_ACTIVE': return 'parked'
    return 'blocked'
def card(c):
    state=c.get('brain_state')
    notes=(c.get('blocking_factors') or [])+(c.get('caveats') or [])
    lis=''.join(f'<li>{h(n)}</li>' for n in notes) or '<li>مورد خاصی ثبت نشده است.</li>'
    return f"""
    <article class='card {cls(state)}'>
      <div class='top'><div><b dir='ltr'>{h(c.get('instrument'))} {h(c.get('timeframe'))}</b><small dir='ltr'>{h(c.get('candidate_family'))}</small></div><span>{h(state_fa(state))}</span></div>
      <p>{h(c.get('reason'))}</p>
      <details><summary>caveat / blocker</summary><ul>{lis}</ul></details>
      <div class='auth'>DISPLAY ONLY · NOT SIGNAL · NO BUY/SELL/HOLD · NO ENTRY/STOP/TARGET</div>
    </article>"""
def main():
    payload=read_json('panel/sig_brain_state_current.json')
    cards=''.join(card(c) for c in payload.get('brain_cards',[]))
    summary=payload.get('summary',{})
    refresh=os.environ.get('MOBILE_REFRESH_WORKER_URL','').strip().rstrip('/')
    html_doc=f"""<!doctype html><html lang='fa' dir='rtl'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>PRV1 + SIG Brain</title>
    <style>body{{margin:0;background:#08111f;color:#eef4ff;font-family:Tahoma,Arial,sans-serif;line-height:1.7}}main{{max-width:860px;margin:auto;padding:16px 12px 70px}}.hero,.card{{background:#111d2e;border:1px solid #26364d;border-radius:20px;padding:14px;margin:12px 0;box-shadow:0 12px 35px #0005}}h1{{font-size:22px;margin:0 0 8px}}.muted,small{{color:#91a0b7}}.grid{{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}}.m{{background:#0b1626;border-radius:14px;padding:10px}}.m b{{display:block;font-size:22px}}.top{{display:flex;justify-content:space-between;gap:10px}}.top span{{font-size:12px;border:1px solid #33455f;border-radius:999px;padding:4px 8px;white-space:nowrap}}.active{{border-color:#1d8b5c}}.warn{{border-color:#a56a09}}.parked{{opacity:.82}}.auth{{direction:ltr;text-align:left;color:#ffdf8a;font-size:11px;border-top:1px dashed #33455f;margin-top:10px;padding-top:8px}}button{{width:100%;border:0;border-radius:15px;background:#1f6feb;color:white;padding:13px;font-weight:700;margin-top:12px}}.status{{background:#0b1626;border-radius:12px;padding:8px;margin-top:8px;color:#91a0b7;font-size:12px}}</style></head>
    <body><main><section class='hero'><h1>PRV1 + SIG Brain</h1><div class='muted'>موتور PRV1 حفظ شده؛ خروجی پنل به Brain State پژوهشی و display-only ارتقا یافته است.</div><div class='grid'><div class='m'><span>Research Active</span><b>{h(summary.get('research_active_count'))}</b></div><div class='m'><span>Parked</span><b>{h(summary.get('parked_count'))}</b></div><div class='m'><span>Signal Authorized</span><b>False</b></div><div class='m'><span>Cards</span><b>{h(summary.get('cards_total'))}</b></div></div><button id='refresh'>به‌روزرسانی الآن</button><div id='status' class='status'>{'Refresh endpoint تنظیم است.' if refresh else 'Refresh endpoint تنظیم نشده است.'}</div></section>{cards}<p class='muted'>Generated: <span dir='ltr'>{h(payload.get('created_at_utc'))}</span>. این صفحه توصیه معامله یا اجرای بروکری نیست.</p></main>
    <script>const endpoint={json.dumps(refresh)};document.getElementById('refresh').onclick=async()=>{{const s=document.getElementById('status'); if(!endpoint){{s.textContent='Refresh endpoint تنظیم نشده است.'; return;}} const pin=prompt('PIN را وارد کن'); if(!pin){{s.textContent='لغو شد'; return;}} try{{s.textContent='درخواست ارسال شد...'; const r=await fetch(endpoint+'/refresh',{{method:'POST',headers:{{'content-type':'application/json','x-refresh-pin':pin}},body:JSON.stringify({{source:'mobile_prv1_sigbrain',requested_at:new Date().toISOString()}})}}); s.textContent=r.ok?'درخواست ثبت شد؛ چند دقیقه بعد refresh کن.':'خطا در refresh: '+r.status;}}catch(e){{s.textContent='خطا: '+e.message;}}}};</script></body></html>"""
    Path('public').mkdir(exist_ok=True)
    Path('public/index.html').write_text(html_doc,encoding='utf-8')
    Path('public/sig_brain_state_current.json').write_text(json.dumps(payload,ensure_ascii=False,indent=2),encoding='utf-8')
    Path('public/proofs').mkdir(parents=True,exist_ok=True)
    proof={'program':'PRV1-SIGBRAIN-DIRECT1','status':'PASS','signal_authorized':False,'forward_shadow_authorized':False,'broker_execution_authorized':False,'action_surface_authorized':False,'cards_checked':len(payload.get('brain_cards',[]))}
    Path('public/proofs/prv1_sigbrain_direct_proof.json').write_text(json.dumps(proof,ensure_ascii=False,indent=2),encoding='utf-8')
    print(json.dumps({'status':'PASS','output':'public/index.html'},ensure_ascii=False))
if __name__=='__main__': main()
'@ | Set-Content -Path "scripts/generate_prv1_sigbrain_panel.py" -Encoding UTF8

          @'
import json, sys
from pathlib import Path
p=Path('panel/sig_brain_state_current.json')
if not p.exists(): raise SystemExit('missing panel/sig_brain_state_current.json')
data=json.loads(p.read_text(encoding='utf-8'))
assert data['summary']['signal_authorized'] is False
assert data['summary']['forward_shadow_authorized'] is False
assert data['summary']['broker_execution_authorized'] is False
assert data['summary']['action_surface_authorized'] is False
for c in data.get('brain_cards',[]):
    assert c.get('signal_authorized') is False
    assert c.get('broker_execution_authorized') is False
    assert c.get('action_surface_authorized') is False
print(json.dumps({'status':'PASS','cards_checked':len(data.get('brain_cards',[])),'signal_authorized':False},ensure_ascii=False))
'@ | Set-Content -Path "scripts/validate_prv1_sigbrain_direct.py" -Encoding UTF8

      - name: Build PRV1 + SIG Brain display-only state
        shell: pwsh
        run: |
          python scripts/adapt_prv1_live_to_sig_brain.py
          python scripts/validate_prv1_sigbrain_direct.py
          python scripts/generate_prv1_sigbrain_panel.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
