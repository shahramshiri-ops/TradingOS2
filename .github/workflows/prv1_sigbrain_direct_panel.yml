name: PRV1 SIG Brain Direct Panel Display Only

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-sigbrain-panel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create SIG Brain display-only payload and panel
        shell: bash
        run: |
          mkdir -p personal_runtime_v1_latest_product/panel/sigbrain
          mkdir -p personal_runtime_v1_latest_product/payloads
          mkdir -p personal_runtime_v1_latest_product/proofs

          cat > personal_runtime_v1_latest_product/payloads/sig_brain_state_current.json <<'JSON'
          {
            "program": "PRV1_SIG_BRAIN_DIRECT_PANEL",
            "authority": "DISPLAY_ONLY_NOT_SIGNAL",
            "signal_authorized": false,
            "broker_execution_authorized": false,
            "forward_shadow_authorized": false,
            "action_surface_authorized": false,
            "cards": [
              {
                "instrument": "EURUSD",
                "timeframe": "H1",
                "brain_state": "RESEARCH_ACTIVE_DISPLAY_ONLY",
                "candidate_family": "london_overlap_directional_persistence",
                "display_authority": "DISPLAY_ONLY_NOT_TRADE_SIGNAL"
              },
              {
                "instrument": "USDJPY",
                "timeframe": "H1",
                "brain_state": "DATA_QUALITY_CAVEATED_RESEARCH_ACTIVE",
                "candidate_family": "trend_session_continuity",
                "display_authority": "DISPLAY_ONLY_NOT_TRADE_SIGNAL"
              },
              {
                "instrument": "XAUUSD",
                "timeframe": "M15",
                "brain_state": "PARKED_NOT_ACTIVE",
                "candidate_family": "event_session_range_expansion",
                "display_authority": "DISPLAY_ONLY_NOT_TRADE_SIGNAL"
              }
            ]
          }
          JSON

          cat > personal_runtime_v1_latest_product/panel/sigbrain/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>PRV1 + SIG Brain</title>
            <style>
              body { margin:0; font-family: Arial, sans-serif; background:#0f172a; color:#e5e7eb; }
              .wrap { max-width: 760px; margin: 0 auto; padding: 18px; }
              .hero { padding: 18px; border-radius: 18px; background:#111827; border:1px solid #334155; }
              .badge { display:inline-block; padding:6px 10px; border-radius:999px; background:#1e293b; color:#93c5fd; font-size:12px; margin-bottom:10px; }
              .card { margin-top:14px; padding:14px; border-radius:16px; background:#020617; border:1px solid #334155; }
              .muted { color:#94a3b8; font-size:13px; }
              .state { font-weight:bold; color:#facc15; }
              .danger { color:#fca5a5; }
              pre { white-space: pre-wrap; word-break: break-word; }
            </style>
          </head>
          <body>
            <div class="wrap">
              <div class="hero">
                <div class="badge">DISPLAY ONLY / NOT SIGNAL</div>
                <h1>PRV1 + SIG Brain</h1>
                <p class="muted">Mobile research-state panel. No buy/sell/hold, no broker execution, no shadow activation.</p>
              </div>
              <div id="cards"></div>
              <div class="card">
                <div class="danger">Forbidden interpretation:</div>
                <p class="muted">This panel is not a trading signal, not validation, not profitability evidence, and not broker-realistic guidance.</p>
              </div>
            </div>
            <script>
              async function main() {
                const res = await fetch('../../payloads/sig_brain_state_current.json?ts=' + Date.now());
                const data = await res.json();
                const root = document.getElementById('cards');
                root.innerHTML = data.cards.map(c => `
                  <div class="card">
                    <h2>${c.instrument} — ${c.timeframe}</h2>
                    <p>Brain State: <span class="state">${c.brain_state}</span></p>
                    <p class="muted">Candidate Family: ${c.candidate_family}</p>
                    <p class="muted">Authority: ${c.display_authority}</p>
                  </div>
                `).join('');
              }
              main().catch(err => {
                document.getElementById('cards').innerHTML = '<div class="card danger">Failed to load payload.</div>';
              });
            </script>
          </body>
          </html>
          HTML

          cat > personal_runtime_v1_latest_product/proofs/prv1_sigbrain_direct_proof.json <<'JSON'
          {
            "status": "PASS",
            "program": "PRV1_SIG_BRAIN_DIRECT_PANEL",
            "signal_authorized": false,
            "broker_execution_authorized": false,
            "forward_shadow_authorized": false,
            "action_surface_authorized": false,
            "created_by": "github_actions_mobile_workflow"
          }
          JSON

      - name: Commit generated SIG Brain panel files
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add personal_runtime_v1_latest_product/panel/sigbrain/index.html
          git add personal_runtime_v1_latest_product/payloads/sig_brain_state_current.json
          git add personal_runtime_v1_latest_product/proofs/prv1_sigbrain_direct_proof.json
          git commit -m "Add PRV1 SIG Brain display-only panel" || echo "No changes to commit"
          git push
