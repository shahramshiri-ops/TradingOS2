name: PRV1 LIVE FRESH1 Freshness Patch

on:
  workflow_dispatch:
  schedule:
    - cron: "23 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: prv1-live-fresh1-pages
  cancel-in-progress: true

jobs:
  normalize-live-freshness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Normalize PRV1 live evidence freshness into SIG Brain payload
        shell: bash
        run: |
          mkdir -p personal_runtime_v1_latest_product/proofs
          mkdir -p personal_runtime_v1_latest_product/reports
          mkdir -p personal_runtime_v1_latest_product/payloads

          python - <<'PY'
          import json
          import re
          from pathlib import Path
          from datetime import datetime, timezone

          ROOT = Path("personal_runtime_v1_latest_product")
          PAYLOAD = ROOT / "payloads/sig_brain_state_current.json"
          PROOF = ROOT / "proofs/prv1_live_fresh1_proof.json"
          REPORT = ROOT / "reports/prv1_live_fresh1_report.json"

          ISO_RE = re.compile(
              r"\\b\\d{4}-\\d{2}-\\d{2}[T ][0-2]\\d:[0-5]\\d:[0-5]\\d(?:\\.\\d+)?(?:Z|[+-]\\d{2}:?\\d{2})?\\b"
          )

          ALIASES = {
              "EURUSD": ["EURUSD", "EUR/USD", "EUR-USD"],
              "USDJPY": ["USDJPY", "USD/JPY", "USD-JPY"],
              "XAUUSD": ["XAUUSD", "XAU/USD", "XAU-USD", "GOLD"]
          }

          def now_utc():
              return datetime.now(timezone.utc).replace(microsecond=0)

          def iso(dt):
              return dt.astimezone(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          def read_json(path, default=None):
              if default is None:
                  default = {}
              try:
                  p = Path(path)
                  if p.exists():
                      return json.loads(p.read_text(encoding="utf-8"))
              except Exception:
                  return default
              return default

          def write_json(path, data):
              Path(path).write_text(json.dumps(data, indent=2, ensure_ascii=False), encoding="utf-8")

          def parse_dt(value):
              if value is None:
                  return None

              text = str(value).strip()
              if not text:
                  return None

              text = text.replace(" ", "T")
              if text.endswith("Z"):
                  text = text[:-1] + "+00:00"

              try:
                  dt = datetime.fromisoformat(text)
                  if dt.tzinfo is None:
                      dt = dt.replace(tzinfo=timezone.utc)
                  return dt.astimezone(timezone.utc)
              except Exception:
                  return None

          def flatten_text(obj, limit=50000):
              out = []

              def walk(x):
                  if len(out) > limit:
                      return
                  if isinstance(x, dict):
                      for k, v in x.items():
                          out.append(str(k))
                          walk(v)
                  elif isinstance(x, list):
                      for v in x:
                          walk(v)
                  else:
                      out.append(str(x))

              walk(obj)
              return " ".join(out)

          def collect_timestamps_from_text(text):
              found = []
              for m in ISO_RE.findall(text or ""):
                  dt = parse_dt(m)
                  if dt:
                      found.append(dt)
              return found

          def report_paths():
              return [
                  ROOT / "reports/staged_provider_fetch_report.json",
                  Path("reports/staged_provider_fetch_report.json"),
                  ROOT / "reports/staged_cache_update_report.json",
                  Path("reports/staged_cache_update_report.json"),
                  ROOT / "reports/candidate_detection_report.json",
                  Path("reports/candidate_detection_report.json"),
                  ROOT / "panel/panel_payload_current.json",
                  Path("panel/panel_payload_current.json"),
                  ROOT / "payloads/sig_brain_state_current.json"
              ]

          def cache_file_candidates(instrument, timeframe):
              names = [
                  f"{instrument}_{timeframe}.json",
                  f"{instrument.lower()}_{timeframe.lower()}.json",
                  f"{instrument}-{timeframe}.json",
                  f"{instrument.lower()}-{timeframe.lower()}.json"
              ]

              bases = [
                  ROOT / "data/provider_cache/twelve_data",
                  Path("data/provider_cache/twelve_data"),
                  ROOT / "cache/twelve_data",
                  Path("cache/twelve_data"),
                  ROOT / "outputs",
                  Path("outputs")
              ]

              out = []
              for b in bases:
                  for n in names:
                      out.append(b / n)
              return out

          def subtree_timestamps_for_surface(obj, instrument, timeframe):
              text = flatten_text(obj)
              text_l = text.lower()

              aliases = ALIASES.get(instrument, [instrument])
              instrument_hit = any(a.lower() in text_l for a in aliases)
              timeframe_hit = timeframe.lower() in text_l

              if instrument_hit and timeframe_hit:
                  return collect_timestamps_from_text(text)

              return []

          def walk_collect_surface_timestamps(data, instrument, timeframe):
              all_ts = []

              def walk(x):
                  if isinstance(x, dict):
                      local_ts = subtree_timestamps_for_surface(x, instrument, timeframe)
                      all_ts.extend(local_ts)
                      for v in x.values():
                          walk(v)
                  elif isinstance(x, list):
                      for v in x:
                          walk(v)

              walk(data)
              return all_ts

          def latest_timestamp_for_card(card, loaded_reports):
              instrument = card.get("instrument")
              timeframe = card.get("timeframe")

              timestamps = []
              sources = []

              for source_path, data in loaded_reports:
                  ts = walk_collect_surface_timestamps(data, instrument, timeframe)
                  if ts:
                      timestamps.extend(ts)
                      sources.append(source_path)

              for p in cache_file_candidates(instrument, timeframe):
                  if p.exists():
                      data = read_json(p, {})
                      text = flatten_text(data)
                      ts = collect_timestamps_from_text(text)
                      if ts:
                          timestamps.extend(ts)
                          sources.append(str(p))

              if not timestamps:
                  return None, []

              latest = max(timestamps)
              return latest, sorted(set(sources))

          def freshness_thresholds_minutes(timeframe):
              tf = str(timeframe).upper()

              if tf == "M5":
                  return 45, 180, 720
              if tf == "M15":
                  return 120, 360, 1440
              if tf == "H1":
                  return 240, 1440, 4320
              if tf == "D1":
                  return 2880, 10080, 20160

              return 240, 1440, 4320

          def classify_freshness(card, latest_dt):
              if not card.get("surface_evidence_available", False):
                  return "UNAVAILABLE", None, "surface_evidence_not_available"

              if latest_dt is None:
                  return "TIMESTAMP_NOT_FOUND_CAVEATED", None, "no_parseable_surface_timestamp_found"

              now = now_utc()
              age_minutes = round((now - latest_dt).total_seconds() / 60.0, 2)

              if age_minutes < -30:
                  return "TIMESTAMP_IN_FUTURE_CAVEATED", age_minutes, "latest_timestamp_is_in_future"

              fresh, stale, very_stale = freshness_thresholds_minutes(card.get("timeframe"))

              if now.weekday() in [5, 6] and age_minutes <= 4320:
                  return "MARKET_CLOSED_OR_WEEKEND_CAVEATED", age_minutes, "utc_weekend_or_market_closed_caveat"

              if age_minutes <= fresh:
                  return "FRESH", age_minutes, "latest_timestamp_within_fresh_threshold"

              if age_minutes <= stale:
                  return "STALE", age_minutes, "latest_timestamp_beyond_fresh_threshold"

              if age_minutes <= very_stale:
                  return "VERY_STALE", age_minutes, "latest_timestamp_beyond_stale_threshold"

              return "VERY_STALE", age_minutes, "latest_timestamp_extremely_old"

          def maybe_adjust_state(card, freshness_status):
              current = card.get("brain_state", "UNKNOWN")

              if current in {"PARKED_NOT_ACTIVE", "SUPPORT_CONTEXT_ONLY"}:
                  return current

              if freshness_status == "UNAVAILABLE":
                  return "DATA_UNAVAILABLE_NO_SIGNAL"

              if freshness_status in {"STALE", "VERY_STALE"}:
                  return "STALE_CONTEXT_NO_SIGNAL"

              return current

          payload = read_json(PAYLOAD, {
              "program": "SIG_BRAIN_RUNTIME1_DYNAMIC_DISPLAY_ONLY",
              "created_at_utc": iso(now_utc()),
              "authority": "DISPLAY_ONLY_NOT_SIGNAL",
              "runtime_mode": "payload_missing",
              "prv1_evidence_files": [],
              "signal_authorized": False,
              "broker_execution_authorized": False,
              "forward_shadow_authorized": False,
              "action_surface_authorized": False,
              "cards": []
          })

          loaded_reports = []
          for p in report_paths():
              if Path(p).exists():
                  loaded_reports.append((str(p), read_json(p, {})))

          cards = payload.get("cards", [])
          report_cards = []

          for card in cards:
              latest_dt, timestamp_sources = latest_timestamp_for_card(card, loaded_reports)
              freshness_status, age_minutes, reason = classify_freshness(card, latest_dt)

              card["latest_provider_datetime_utc"] = iso(latest_dt) if latest_dt else None
              card["freshness_status"] = freshness_status
              card["freshness_age_minutes"] = age_minutes
              card["freshness_reason"] = reason
              card["freshness_timestamp_sources"] = timestamp_sources

              original_state = card.get("brain_state")
              card["brain_state_before_fresh1"] = original_state
              card["brain_state"] = maybe_adjust_state(card, freshness_status)

              caveats = card.get("caveats", [])
              if freshness_status in {"TIMESTAMP_NOT_FOUND_CAVEATED", "TIMESTAMP_IN_FUTURE_CAVEATED", "MARKET_CLOSED_OR_WEEKEND_CAVEATED"}:
                  caveats.append(f"FRESH1_{freshness_status}")
              if freshness_status in {"STALE", "VERY_STALE"}:
                  caveats.append("FRESH1_STALE_CONTEXT_BLOCKS_ACTIVE_RUNTIME_STATE")
              card["caveats"] = sorted(set(caveats))

              blockers = card.get("blockers", [])
              if freshness_status in {"STALE", "VERY_STALE"}:
                  blockers.append("STALE_CONTEXT_NO_SIGNAL_BY_FRESH1")
              if freshness_status == "UNAVAILABLE":
                  blockers.append("UNAVAILABLE_CONTEXT_NO_SIGNAL_BY_FRESH1")
              card["blockers"] = sorted(set(blockers))

              report_cards.append({
                  "surface": card.get("surface"),
                  "instrument": card.get("instrument"),
                  "timeframe": card.get("timeframe"),
                  "state_before": original_state,
                  "state_after": card.get("brain_state"),
                  "freshness_status": freshness_status,
                  "freshness_age_minutes": age_minutes,
                  "latest_provider_datetime_utc": card["latest_provider_datetime_utc"],
                  "freshness_reason": reason,
                  "timestamp_sources": timestamp_sources
              })

          payload["program"] = "SIG_BRAIN_RUNTIME1_DYNAMIC_DISPLAY_ONLY_PLUS_FRESH1"
          payload["fresh1_applied_at_utc"] = iso(now_utc())
          payload["signal_authorized"] = False
          payload["broker_execution_authorized"] = False
          payload["forward_shadow_authorized"] = False
          payload["action_surface_authorized"] = False
          payload["cards"] = cards

          forbidden = {
              "BUY",
              "SELL",
              "HOLD",
              "ENTRY",
              "STOP",
              "TARGET",
              "BROKER_EXECUTION",
              "SIGNAL_AUTHORIZED"
          }

          proof = {
              "status": "PASS",
              "program": "PRV1_LIVE_FRESH1",
              "scope": "freshness_normalization_only",
              "applied_at_utc": iso(now_utc()),
              "cards_checked": len(cards),
              "timestamp_found_count": sum(1 for c in cards if c.get("latest_provider_datetime_utc")),
              "timestamp_missing_count": sum(1 for c in cards if not c.get("latest_provider_datetime_utc")),
              "stale_or_very_stale_count": sum(1 for c in cards if c.get("freshness_status") in {"STALE", "VERY_STALE"}),
              "signal_authorized": False,
              "broker_execution_authorized": False,
              "forward_shadow_authorized": False,
              "action_surface_authorized": False,
              "forbidden_state_count": 0
          }

          for c in cards:
              if c.get("brain_state") in forbidden:
                  proof["status"] = "FAIL"
                  proof["forbidden_state_count"] += 1

          report = {
              "program": "PRV1_LIVE_FRESH1",
              "applied_at_utc": proof["applied_at_utc"],
              "loaded_report_files": [x[0] for x in loaded_reports],
              "card_freshness": report_cards,
              "proof": proof,
              "interpretation": [
                  "Freshness is display-only runtime hygiene.",
                  "Freshness does not create signal authority.",
                  "Stale or unavailable context blocks active runtime state into no-signal where applicable.",
                  "Timestamp missing remains caveated and must not be treated as fresh."
              ]
          }

          write_json(PAYLOAD, payload)
          write_json(PROOF, proof)
          write_json(REPORT, report)

          if proof["status"] != "PASS":
              raise SystemExit("PRV1 LIVE FRESH1 proof failed")
          PY

      - name: Commit FRESH1 normalized payload and proof
        shell: bash
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add personal_runtime_v1_latest_product/payloads/sig_brain_state_current.json
          git add personal_runtime_v1_latest_product/proofs/prv1_live_fresh1_proof.json
          git add personal_runtime_v1_latest_product/reports/prv1_live_fresh1_report.json

          git commit -m "Apply PRV1 LIVE FRESH1 freshness normalization" || echo "No changes to commit"
          git push

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
