name: PRV1 Brain ORCH1 Unified Runtime

on:
  workflow_dispatch:
  schedule:
    - cron: "41 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: prv1-brain-orch1-pages
  cancel-in-progress: true

jobs:
  unified-brain-runtime:
    runs-on: ubuntu-latest

    env:
      TD_API_KEY_PRIMARY: ${{ secrets.LFB_TWELVE_DATA_API_KEY }}
      TD_API_KEY_ALT: ${{ secrets.TWELVE_DATA_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run unified PRV1 SIG Brain runtime
        shell: bash
        run: |
          mkdir -p personal_runtime_v1_latest_product/payloads
          mkdir -p personal_runtime_v1_latest_product/reports
          mkdir -p personal_runtime_v1_latest_product/proofs
          mkdir -p personal_runtime_v1_latest_product/journal
          mkdir -p personal_runtime_v1_latest_product/panel/sigbrain
          mkdir -p personal_runtime_v1_latest_product/panel/sigbrain-journal
          mkdir -p personal_runtime_v1_latest_product/scripts

          cat > personal_runtime_v1_latest_product/scripts/prv1_brain_orch1_unified_runtime.py <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request
          from pathlib import Path
          from datetime import datetime, timezone

          ROOT = Path("personal_runtime_v1_latest_product")

          PAYLOAD = ROOT / "payloads/sig_brain_state_current.json"
          REPORT = ROOT / "reports/prv1_brain_orch1_runtime_report.json"
          PROOF = ROOT / "proofs/prv1_brain_orch1_proof.json"

          JOURNAL = ROOT / "journal/sig_brain_state_journal.jsonl"
          JOURNAL_SUMMARY = ROOT / "journal/sig_brain_state_journal_summary.json"

          API_KEY = os.environ.get("TD_API_KEY_PRIMARY") or os.environ.get("TD_API_KEY_ALT") or ""

          OBJECTS = [
              {
                  "instrument": "EURUSD",
                  "timeframe": "H1",
                  "surface": "EURUSD_H1",
                  "sig_object_id": "EURUSD_H1_LONDON_OVERLAP_DIRECTIONAL_PERSISTENCE_OBJECT_SPEC_v1_0",
                  "candidate_family": "london_overlap_directional_persistence",
                  "lifecycle": "RESEARCH_ACTIVE",
                  "provider_symbol": "EUR/USD",
                  "provider_interval": "1h"
              },
              {
                  "instrument": "USDJPY",
                  "timeframe": "H1",
                  "surface": "USDJPY_H1",
                  "sig_object_id": "USDJPY_H1_TREND_SESSION_CONTINUITY_OBJECT_SPEC_v1_0",
                  "candidate_family": "trend_session_continuity",
                  "lifecycle": "RESEARCH_ACTIVE_WITH_DATA_QUALITY_CAVEAT",
                  "provider_symbol": "USD/JPY",
                  "provider_interval": "1h"
              },
              {
                  "instrument": "XAUUSD",
                  "timeframe": "M15",
                  "surface": "XAUUSD_M15",
                  "sig_object_id": "XAUUSD_M15_EVENT_SESSION_RANGE_EXPANSION_CANDIDATE_LIKE_OBJECT_v1_0",
                  "candidate_family": "event_session_range_expansion",
                  "lifecycle": "PARKED_FOR_PORTFOLIO_BALANCE",
                  "provider_symbol": "XAU/USD",
                  "provider_interval": "15min"
              },
              {
                  "instrument": "EURUSD",
                  "timeframe": "M15",
                  "surface": "EURUSD_M15",
                  "sig_object_id": "EURUSD_M15_LOW_VOL_COMPRESSION_FULL_DOMAIN_DisplayContract_v0_3",
                  "candidate_family": "low_vol_compression_full_domain_display_contract",
                  "lifecycle": "PARKED_DISPLAY_CONTRACT_CLOSED",
                  "provider_symbol": "EUR/USD",
                  "provider_interval": "15min"
              },
              {
                  "instrument": "USDJPY",
                  "timeframe": "M15",
                  "surface": "USDJPY_M15",
                  "sig_object_id": "USDJPY_M15_ASIA_RANGE_NEUTRAL_FULL_ASIA_v1_0",
                  "candidate_family": "asia_range_neutral_full_asia",
                  "lifecycle": "PARKED_DIAGNOSTIC_COMPLETE_FOR_NOW",
                  "provider_symbol": "USD/JPY",
                  "provider_interval": "15min"
              },
              {
                  "instrument": "XAUUSD",
                  "timeframe": "H1",
                  "surface": "XAUUSD_H1",
                  "sig_object_id": "XAU_H1_RISK_OFF_CANDIDATE_FLOW_CONTEXT_v1_0",
                  "candidate_family": "risk_off_candidate_flow_context",
                  "lifecycle": "SUPPORT_CONTEXT_ONLY",
                  "provider_symbol": "XAU/USD",
                  "provider_interval": "1h"
              }
          ]

          def now_utc():
              return datetime.now(timezone.utc).replace(microsecond=0)

          def iso(dt):
              if dt is None:
                  return None
              return dt.astimezone(timezone.utc).replace(microsecond=0).isoformat().replace("+00:00", "Z")

          def write_json(path, data):
              Path(path).write_text(json.dumps(data, indent=2, ensure_ascii=False), encoding="utf-8")

          def read_json(path, default=None):
              if default is None:
                  default = {}
              try:
                  p = Path(path)
                  if p.exists():
                      return json.loads(p.read_text(encoding="utf-8"))
              except Exception:
                  return default
              return default

          def parse_dt(value):
              if value is None:
                  return None

              text = str(value).strip()
              if not text:
                  return None

              text = text.replace(" ", "T")

              if text.endswith("Z"):
                  text = text[:-1] + "+00:00"

              try:
                  dt = datetime.fromisoformat(text)
                  if dt.tzinfo is None:
                      dt = dt.replace(tzinfo=timezone.utc)
                  return dt.astimezone(timezone.utc)
              except Exception:
                  return None

          def thresholds_minutes(timeframe):
              tf = str(timeframe).upper()

              if tf == "M15":
                  return 120, 360, 1440

              if tf == "H1":
                  return 240, 1440, 4320

              if tf == "D1":
                  return 2880, 10080, 20160

              return 240, 1440, 4320

          def classify_freshness(timeframe, latest_dt):
              if latest_dt is None:
                  return "TIMESTAMP_NOT_FOUND_CAVEATED", None, "no_parseable_timestamp"

              age_minutes = round((now_utc() - latest_dt).total_seconds() / 60.0, 2)

              if age_minutes < -30:
                  return "TIMESTAMP_IN_FUTURE_CAVEATED", age_minutes, "provider_timestamp_is_in_future"

              fresh, stale, very_stale = thresholds_minutes(timeframe)

              if now_utc().weekday() in [5, 6] and age_minutes <= 4320:
                  return "MARKET_CLOSED_OR_WEEKEND_CAVEATED", age_minutes, "utc_weekend_or_market_closed_caveat"

              if age_minutes <= fresh:
                  return "FRESH", age_minutes, "provider_timestamp_within_fresh_threshold"

              if age_minutes <= stale:
                  return "STALE", age_minutes, "provider_timestamp_beyond_fresh_threshold"

              if age_minutes <= very_stale:
                  return "VERY_STALE", age_minutes, "provider_timestamp_beyond_stale_threshold"

              return "VERY_STALE", age_minutes, "provider_timestamp_extremely_old"

          def flatten_strings(obj, limit=50000):
              out = []

              def walk(x):
                  if len(out) > limit:
                      return
                  if isinstance(x, dict):
                      for k, v in x.items():
                          out.append(str(k))
                          walk(v)
                  elif isinstance(x, list):
                      for v in x:
                          walk(v)
                  else:
                      out.append(str(x))

              walk(obj)
              return " ".join(out)

          def read_prv1_evidence_files():
              paths = [
                  ROOT / "reports/staged_provider_fetch_report.json",
                  Path("reports/staged_provider_fetch_report.json"),
                  ROOT / "reports/staged_cache_update_report.json",
                  Path("reports/staged_cache_update_report.json"),
                  ROOT / "reports/candidate_detection_report.json",
                  Path("reports/candidate_detection_report.json"),
                  ROOT / "panel/panel_payload_current.json",
                  Path("panel/panel_payload_current.json"),
                  ROOT / "reports/prv1_live_feed1_twelvedata_timestamp_report.json"
              ]

              loaded = []

              for p in paths:
                  if Path(p).exists():
                      loaded.append(str(p))

              return loaded

          def fetch_twelve_data(obj):
              if not API_KEY:
                  return {
                      "fetch_status": "BLOCKED_MISSING_TWELVE_DATA_API_KEY",
                      "provider_datetime_raw": None,
                      "latest_provider_datetime_utc": None,
                      "freshness_status": "UNAVAILABLE",
                      "freshness_age_minutes": None,
                      "freshness_reason": "missing_github_secret_LFB_TWELVE_DATA_API_KEY_or_TWELVE_DATA_API_KEY",
                      "provider_error_message": None
                  }

              params = {
                  "symbol": obj["provider_symbol"],
                  "interval": obj["provider_interval"],
                  "outputsize": "1",
                  "timezone": "UTC",
                  "apikey": API_KEY
              }

              url = "https://api.twelvedata.com/time_series?" + urllib.parse.urlencode(params)

              try:
                  req = urllib.request.Request(
                      url,
                      headers={"User-Agent": "PRV1-SIG-Brain-ReadOnly/1.0"}
                  )

                  with urllib.request.urlopen(req, timeout=30) as resp:
                      raw = resp.read().decode("utf-8")

                  data = json.loads(raw)

                  if isinstance(data, dict) and data.get("status") == "error":
                      return {
                          "fetch_status": "PROVIDER_ERROR",
                          "provider_datetime_raw": None,
                          "latest_provider_datetime_utc": None,
                          "freshness_status": "UNAVAILABLE",
                          "freshness_age_minutes": None,
                          "freshness_reason": "provider_returned_error",
                          "provider_error_message": data.get("message") or data.get("code")
                      }

                  values = data.get("values") if isinstance(data, dict) else None

                  if not values:
                      return {
                          "fetch_status": "NO_VALUES_RETURNED",
                          "provider_datetime_raw": None,
                          "latest_provider_datetime_utc": None,
                          "freshness_status": "UNAVAILABLE",
                          "freshness_age_minutes": None,
                          "freshness_reason": "provider_returned_no_values",
                          "provider_error_message": None
                      }

                  first = values[0]
                  dt_raw = first.get("datetime") or first.get("timestamp")
                  dt = parse_dt(dt_raw)

                  freshness_status, age_minutes, reason = classify_freshness(obj["timeframe"], dt)

                  return {
                      "fetch_status": "OK",
                      "provider_datetime_raw": dt_raw,
                      "latest_provider_datetime_utc": iso(dt),
                      "freshness_status": freshness_status,
                      "freshness_age_minutes": age_minutes,
                      "freshness_reason": reason,
                      "provider_error_message": None
                  }

              except Exception as exc:
                  return {
                      "fetch_status": "FETCH_EXCEPTION",
                      "provider_datetime_raw": None,
                      "latest_provider_datetime_utc": None,
                      "freshness_status": "UNAVAILABLE",
                      "freshness_age_minutes": None,
                      "freshness_reason": "exception_during_read_only_fetch",
                      "provider_error_message": str(exc)[:300]
                  }

          def derive_state(obj, feed):
              lifecycle = obj["lifecycle"]
              freshness = feed.get("freshness_status")

              if lifecycle.startswith("PARKED"):
                  return "PARKED_NOT_ACTIVE"

              if lifecycle == "SUPPORT_CONTEXT_ONLY":
                  return "SUPPORT_CONTEXT_ONLY"

              if freshness == "UNAVAILABLE":
                  return "DATA_UNAVAILABLE_NO_SIGNAL"

              if freshness in {"STALE", "VERY_STALE"}:
                  return "STALE_CONTEXT_NO_SIGNAL"

              if obj["instrument"] == "USDJPY" and obj["timeframe"] == "H1":
                  return "DATA_QUALITY_CAVEATED_RESEARCH_ACTIVE"

              if obj["instrument"] == "EURUSD" and obj["timeframe"] == "H1":
                  return "RESEARCH_ACTIVE_DISPLAY_ONLY"

              return "RESEARCH_ACTIVE_DISPLAY_ONLY"

          def build_card(obj, feed):
              state = derive_state(obj, feed)

              caveats = [
                  "DISPLAY_ONLY_NOT_SIGNAL",
                  "NO_BUY_SELL_HOLD",
                  "NO_ENTRY_STOP_TARGET",
                  "NO_BROKER_EXECUTION",
                  "NO_SHADOW_ACTIVATION"
              ]

              blockers = []

              if obj["lifecycle"].startswith("PARKED"):
                  blockers.append("SIG_LIFECYCLE_PARKED_OR_COMPLETE_FOR_NOW")

              if obj["lifecycle"] == "SUPPORT_CONTEXT_ONLY":
                  caveats.append("SUPPORT_CONTEXT_ONLY_NOT_SIGNAL_SOURCE")

              if obj["instrument"] == "USDJPY" and obj["timeframe"] == "H1":
                  caveats.append("USDJPY_H1_DATA_QUALITY_CAVEAT_CARRIED_FORWARD")

              if obj["instrument"] == "XAUUSD" and obj["timeframe"] == "M15":
                  caveats.append("XAU_M15_PARKED_AFTER_PORTFOLIO_REASSESSMENT")

              freshness = feed.get("freshness_status")

              if feed.get("fetch_status") != "OK":
                  caveats.append("ORCH1_PROVIDER_FETCH_NOT_OK")

              if freshness in {
                  "TIMESTAMP_NOT_FOUND_CAVEATED",
                  "TIMESTAMP_IN_FUTURE_CAVEATED",
                  "MARKET_CLOSED_OR_WEEKEND_CAVEATED"
              }:
                  caveats.append("ORCH1_" + str(freshness))

              if freshness == "UNAVAILABLE":
                  blockers.append("ORCH1_UNAVAILABLE_NO_SIGNAL")

              if freshness in {"STALE", "VERY_STALE"}:
                  blockers.append("ORCH1_STALE_CONTEXT_NO_SIGNAL")
                  caveats.append("ORCH1_STALE_CONTEXT_BLOCKS_ACTIVE_RUNTIME_STATE")

              if state in {"RESEARCH_ACTIVE_DISPLAY_ONLY", "DATA_QUALITY_CAVEATED_RESEARCH_ACTIVE"}:
                  caveats.append("RESEARCH_ACTIVE_DOES_NOT_MEAN_SIGNAL_AUTHORIZED")
                  caveats.append("EVENT_AND_COST_CONTEXT_REMAIN_CAVEATED_UNLESS_RUNTIME_OUTPUT_PROVES_OTHERWISE")

              return {
                  "instrument": obj["instrument"],
                  "timeframe": obj["timeframe"],
                  "surface": obj["surface"],
                  "sig_object_id": obj["sig_object_id"],
                  "candidate_family": obj["candidate_family"],
                  "sig_lifecycle": obj["lifecycle"],
                  "brain_state": state,
                  "surface_evidence_available": feed.get("fetch_status") == "OK",
                  "surface_evidence_reason": "twelve_data_read_only_feed" if feed.get("fetch_status") == "OK" else feed.get("fetch_status"),
                  "provider_symbol": obj["provider_symbol"],
                  "provider_interval": obj["provider_interval"],
                  "latest_provider_datetime_utc": feed.get("latest_provider_datetime_utc"),
                  "freshness_status": feed.get("freshness_status"),
                  "freshness_age_minutes": feed.get("freshness_age_minutes"),
                  "freshness_reason": feed.get("freshness_reason"),
                  "display_authority": "DISPLAY_ONLY_NOT_TRADE_SIGNAL",
                  "signal_authorized": False,
                  "broker_execution_authorized": False,
                  "forward_shadow_authorized": False,
                  "action_surface_authorized": False,
                  "blockers": sorted(set(blockers)),
                  "caveats": sorted(set(caveats))
              }

          def state_label(state):
              labels = {
                  "RESEARCH_ACTIVE_DISPLAY_ONLY": "Research active",
                  "DATA_QUALITY_CAVEATED_RESEARCH_ACTIVE": "Research active — data caveat",
                  "PARKED_NOT_ACTIVE": "Parked",
                  "SUPPORT_CONTEXT_ONLY": "Support context only",
                  "DATA_UNAVAILABLE_NO_SIGNAL": "No signal — data unavailable",
                  "STALE_CONTEXT_NO_SIGNAL": "No signal — stale context",
                  "EVENT_CAVEATED_DISPLAY_ONLY": "Event caveat",
                  "COST_CAVEATED_DISPLAY_ONLY": "Cost caveat"
              }
              return labels.get(state, state or "Unknown")

          def write_main_panel():
