name: SIG Brain5 Context Builder + Brain4 Panel

on:
  workflow_dispatch:
  push:
    paths:
      - 'inputs/sig_brain5_raw_bars_latest.json'
      - 'scripts/build_sig_brain5_live_context.py'
      - 'scripts/build_sig_brain4_runtime_payload.py'
      - 'data/sig_brain/**'
      - 'panel/brain4/**'

jobs:
  build-brain-context:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build derived Brain5 live context
        run: |
          python scripts/build_sig_brain5_live_context.py
          python scripts/validate_sig_brain5_context_builder.py
      - name: Commit derived display-only context and payload
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add inputs/sig_brain4_live_context_latest.json runtime/sig_brain/sig_brain5_derived_context_latest.json runtime/sig_brain/sig_brain4_runtime_payload_current.json panel/brain4/sig_brain4_runtime_payload_current.json proofs/sig_brain5_context_validation_result.json proofs/sig_brain4_validation_result.json
          git commit -m "Update SIG Brain5 derived context and Brain4 payload" || echo "No changes"
          git push || true
