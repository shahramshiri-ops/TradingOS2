name: SIG Brain4 Display-Only Mobile Panel

on:
  workflow_dispatch:
  push:
    paths:
      - 'data/sig_brain/**'
      - 'inputs/sig_brain4_live_context_latest.json'
      - 'scripts/build_sig_brain4_runtime_payload.py'
      - 'panel/brain4/**'

jobs:
  build-brain4-panel:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Build SIG Brain4 display-only runtime payload
        run: |
          python scripts/build_sig_brain4_runtime_payload.py
          python scripts/validate_sig_brain4_outputs.py
      - name: Commit generated display-only payload
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add runtime/sig_brain/sig_brain4_runtime_payload_current.json panel/brain4/sig_brain4_runtime_payload_current.json proofs/sig_brain4_validation_result.json
          git commit -m "Update SIG Brain4 display-only payload" || echo "No changes"
          git push || true
